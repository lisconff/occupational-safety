<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>职途安 - 大学生求职防坑平台</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "PingFang SC", Arial;
}

/* ===== Header ===== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 40px;
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(12px);
  z-index: 1000;
}

.logo {
  font-weight: bold;
  font-size: 20px;
}

/* 导航 */
.nav-center {
  display: flex;
  gap: 30px;
}

.nav-center a {
  text-decoration: none;
  color: #333;
  font-size: 14px;
  position: relative;
}

.nav-center a::after {
  content: '';
  position: absolute;
  bottom: -5px;
  left: 0;
  width: 0;
  height: 2px;
  background: #1677ff;
  transition: 0.3s;
}

.nav-center a:hover::after {
  width: 100%;
}

/* 右侧 */
.nav-right {
  display: flex;
  align-items: center;
  gap: 15px;
}

.nav-btn {
  padding: 6px 14px;
  border-radius: 20px;
  background: #eee;
  text-decoration: none;
  color: #333;
  font-size: 13px;
}

.nav-btn.primary {
  background: #1677ff;
  color: #fff;
}

/* 用户 */
#user-nav {
  display: none;
  align-items: center;
  gap: 10px;
}

.avatar-wrapper {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  overflow: hidden;
  background: #1677ff;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ===== Hero ===== */
.hero {
  height: 100vh;
  background: url("assets/images/pages/首屏.png") center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* 🔥 动态渐变遮罩 */
.hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    rgba(0,0,0,0.2),
    rgba(0,0,0,0.4)
  );
  pointer-events: none;
}

/* 🔥 科技感流动光 */
.hero::before {
  content: '';
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(22,119,255,0.15), transparent 60%);
  animation: moveLight 10s linear infinite;
}

@keyframes moveLight {
  0% { transform: translate(-50%, -50%); }
  50% { transform: translate(0%, 0%); }
  100% { transform: translate(-50%, -50%); }
}

.hero-content {
  position: relative;
  z-index: 2;
  color: #fff;
  text-align: center;
}

.hero h1 {
  font-size: 46px;
  margin-bottom: 10px;
  text-shadow: 0 6px 30px rgba(0,0,0,0.6);
}

.hero p {
  opacity: 0.9;
  margin-bottom: 25px;
}

/* ===== 按钮升级 ===== */
.btn {
  position: relative;
  overflow: hidden;
  padding: 12px 28px;
  border-radius: 30px;
  text-decoration: none;
  color: #fff;
  border: 1px solid #fff;
  margin: 0 10px;
  cursor: pointer;
  transition: all 0.3s ease;
}

/* 主按钮 */
.btn.primary {
  background: linear-gradient(90deg, #1677ff, #4a90e2);
  border: none;
  box-shadow: 0 6px 20px rgba(22,119,255,0.4);
}

/* 🔥 hover发光 */
.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(22,119,255,0.5);
}

/* 🔥 波纹效果 */
.btn::after {
  content: '';
  position: absolute;
  width: 0;
  height: 0;
  background: rgba(255,255,255,0.4);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  opacity: 0;
}

.btn:active::after {
  width: 200px;
  height: 200px;
  opacity: 1;
  transition: 0s;
}

/* ===== 功能区 ===== */
.features {
  padding: 80px;
}

.feature-card {
  display: flex;
  align-items: center;
  margin-bottom: 100px;
  gap: 50px;
  opacity: 0;
  transform: translateY(40px);
  transition: 0.6s;
}

.feature-card.show {
  opacity: 1;
  transform: translateY(0);
}

.feature-card.reverse {
  flex-direction: row-reverse;
}

.feature-card img {
  width: 50%;
  border-radius: 16px;
  transition: 0.3s;
}

/* 🔥 图片hover微动 */
.feature-card img:hover {
  transform: scale(1.03);
}

.feature-text {
  width: 50%;
}

.feature-text h2 {
  font-size: 28px;
  margin-bottom: 10px;
}

.feature-text p {
  color: #666;
  margin-bottom: 20px;
}

.btn.small {
  padding: 8px 18px;
  background: #1677ff;
  border: none;
}

/* ===== Footer ===== */
.footer {
  text-align: center;
  padding: 30px;
  background: #111;
  color: #aaa;
}
</style>

</head>

<body>

<header class="header">
  <div class="logo">职途安</div>

  <nav class="nav-center">
    <a href="aizhushou.html">AI助手</a>
    <a href="anli.html">案例模拟</a>
    <a href="forum/index.html">交流论坛</a>
  </nav>

  <div class="nav-right">
    <div id="guest-nav">
      <a href="login/index.html" class="nav-btn">登录</a>
      <a href="register/index.html" class="nav-btn primary">注册</a>
    </div>

    <div id="user-nav">
      <div class="avatar-wrapper">
        <span id="avatar-letter"></span>
      </div>
      <span id="user-name">用户</span>
      <a href="#" id="logout-btn" class="nav-btn">退出</a>
    </div>
  </div>
</header>

<section class="hero">
  <div class="hero-content">
    <h1>让每一次求职，都更安全</h1>
    <p>识别陷阱 · 模拟场景 · 真实交流</p>

    <a href="register/index.html" class="btn primary">立即注册</a>
    <a href="aizhushou.html" class="btn">体验AI助手</a>

  </div>
</section>

<section class="features">

  <div class="feature-card">
    <img src="assets/images/pages/ai助手.png">
    <div class="feature-text">
      <h2>AI合同检测</h2>
      <p>上传合同，智能识别风险条款</p>
      <a href="aizhushou.html" class="btn small">进入</a>
    </div>
  </div>

  <div class="feature-card reverse">
    <img src="assets/images/pages/案例模拟.jpg">
    <div class="feature-text">
      <h2>案例模拟</h2>
      <p>模拟真实求职，提前避坑</p>
      <a href="anli.html" class="btn small">进入</a>
    </div>
  </div>

  <div class="feature-card">
    <img src="assets/images/pages/交流论坛.jpg">
    <div class="feature-text">
      <h2>交流论坛</h2>
      <p>分享经验，获取真实建议</p>
      <a href="forum/index.html" class="btn small">进入</a>
    </div>
  </div>

</section>

<footer class="footer">
  © 职途安 - 大学生求职防坑平台
</footer>

<script>
// 滚动动画
const cards = document.querySelectorAll('.feature-card');
window.addEventListener('scroll', () => {
  const trigger = window.innerHeight * 0.85;
  cards.forEach(card => {
    if (card.getBoundingClientRect().top < trigger) {
      card.classList.add('show');
    }
  });
});

// 登录状态
const guestNav = document.getElementById('guest-nav');
const userNav = document.getElementById('user-nav');
const userNameEl = document.getElementById('user-name');
const avatarLetterEl = document.getElementById('avatar-letter');

window.addEventListener('load', () => {
  const token = localStorage.getItem('userToken');
  const name = localStorage.getItem('userName');

  if (token) {
    guestNav.style.display = 'none';
    userNav.style.display = 'flex';
    const displayName = name || 'User';
    userNameEl.textContent = displayName;
    avatarLetterEl.textContent = displayName.charAt(0).toUpperCase();
  }
});

// 退出
document.getElementById('logout-btn').onclick = () => {
  localStorage.clear();
  location.reload();
};
</script>

</body>
</html>
