<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 小眼睛样式 不影响你原有布局 */
        .password-box {
            position: relative;
        }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            padding: 0;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h2>创建账号</h2>
            <p>请填写信息完成注册</p>
        </div>

        <!-- 第一步：账号密码 -->
        <div class="step active" id="step1">
            <form class="register-form">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" id="username" class="form-input" placeholder="请输入用户名" required>
                </div>

                <div class="form-group">
                    <label class="form-label">邮箱</label>
                    <input type="email" id="email" class="form-input" placeholder="example@email.com" required>
                </div>

                <!-- 密码框 + 小眼睛 -->
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <div class="password-box">
                        <input type="password" id="password" class="form-input" placeholder="至少8位，字母+数字" required>
                        <button type="button" class="toggle-password" id="togglePassword">👁️</button>
                    </div>
                </div>

                <!-- 确认密码框 + 同步小眼睛 -->
                <div class="form-group">
                    <label class="form-label">确认密码</label>
                    <div class="password-box">
                        <input type="password" id="repassword" class="form-input" placeholder="再次输入密码" required>
                    </div>
                </div>

                <button type="button" class="register-btn" id="nextBtn">下一步</button>
            </form>
        </div>

        <!-- 第二步：手机号 + 验证码 -->
        <div class="step" id="step2">
            <form class="register-form" id="registerForm">
                <div class="form-group">
                    <label class="form-label">手机号（模拟验证）</label>
                    <input type="text" id="phone" class="form-input" placeholder="请输入11位数字" required>
                    <div style="font-size:12px;color:#666;margin-top:4px;">任意11位数字即可，无需真实号码</div>
                </div>

                <div class="form-group">
                    <label class="form-label">验证码</label>
                    <div style="display:flex;gap:10px;">
                        <input type="text" id="code" class="form-input" placeholder="请输入验证码" required>
                        <button type="button" class="register-btn" id="getCodeBtn" style="white-space:nowrap;width:120px;">获取验证码</button>
                    </div>
                    <div id="codeTip" style="font-size:12px;color:#1677ff;margin-top:4px;"></div>
                </div>

                <button type="submit" class="register-btn" id="registerBtn">完成注册</button>
            </form>
        </div>

        <div class="login-link">
            已有账号？<a href="../login/index.html">去登录</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
