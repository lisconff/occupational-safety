<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 助手连接测试</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --panel: #ffffff;
            --line: #d9e2ef;
            --text: #1f2937;
            --muted: #6b7280;
            --brand: #1677ff;
            --brand-hover: #0f5dcc;
            --user-bubble: #e7f1ff;
            --bot-bubble: #f3f4f6;
            --danger: #d93025;
        }

        * {
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at top, #e8f1ff 0%, var(--bg) 60%);
            color: var(--text);
            min-height: 100vh;
            padding: 24px 12px;
        }

        .chat-shell {
            width: min(1080px, 100%);
            margin: 0 auto;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 14px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .header {
            padding: 16px 18px;
            border-bottom: 1px solid var(--line);
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            background: #f8fbff;
        }

        .title {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
        }

        .endpoint {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .endpoint input {
            width: 360px;
            max-width: 100%;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 14px;
        }

        .hint {
            font-size: 12px;
            color: var(--muted);
        }

        .status {
            padding: 8px 14px;
            border-bottom: 1px solid var(--line);
            font-size: 13px;
            color: var(--muted);
            background: #fcfdff;
        }

        .status.error {
            color: var(--danger);
        }

        .messages {
            height: 460px;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: linear-gradient(180deg, #fbfdff 0%, #f8fbff 100%);
        }

        .message {
            width: fit-content;
            max-width: 20em;
            min-width: 10em;
            padding: 10px 12px;
            border-radius: 10px;
            line-height: 1.6;
            font-size: 16px;
            white-space: pre-wrap;
            word-break: break-word;
            border: 1px solid transparent;
        }

        .message p {
            margin: 0 0 8px 0;
            font-size: 16px;
            font-weight: 400;
            line-height: 1.6;
        }

        .message p:last-child {
            margin-bottom: 0;
        }

        .message h1,
        .message h2,
        .message h3,
        .message h4,
        .message h5,
        .message h6,
        .message strong {
            margin: 0 0 8px 0;
            font-size: 16px;
            line-height: 1.6;
            font-weight: 600;
        }

        .message li {
            font-size: 16px;
            line-height: 1.6;
        }

        .message pre {
            margin: 8px 0;
            padding: 8px;
            background: rgba(0, 0, 0, 0.06);
            border-radius: 8px;
            overflow-x: auto;
            font-size: 13px;
        }

        .message code {
            font-family: Consolas, monospace;
        }

        .message ul {
            margin: 6px 0 6px 20px;
            padding: 0;
        }

        .message a {
            color: #0f5dcc;
            text-decoration: underline;
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-bubble);
            border-color: #c6dcff;
        }

        .message.bot {
            align-self: flex-start;
            background: var(--bot-bubble);
            border-color: #e3e6ea;
        }

        .composer {
            border-top: 1px solid var(--line);
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #ffffff;
        }

        .composer-top {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .composer-main {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: stretch;
        }

        .file-input {
            max-width: 100%;
            font-size: 14px;
        }

        .file-name {
            font-size: 13px;
            color: var(--muted);
        }

        .upload-progress-wrap {
            width: min(560px, 100%);
            display: none;
            align-items: center;
            gap: 8px;
        }

        .upload-progress-track {
            flex: 1;
            height: 8px;
            background: #e9eef7;
            border-radius: 99px;
            overflow: hidden;
        }

        .upload-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #1677ff, #59a2ff);
            transition: width 0.15s linear;
        }

        .upload-progress-text {
            font-size: 12px;
            color: var(--muted);
            min-width: 88px;
            text-align: right;
        }

        textarea {
            resize: none;
            height: 110px;
            border-radius: 10px;
            border: 1px solid var(--line);
            padding: 12px;
            font-size: 16px;
            line-height: 1.5;
        }

        button {
            border: none;
            border-radius: 10px;
            background: var(--brand);
            color: #fff;
            width: 110px;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            background: var(--brand-hover);
        }

        button:disabled {
            background: #9aa7bd;
            cursor: not-allowed;
        }

        @media (max-width: 680px) {
            .messages {
                height: 55vh;
            }

            .composer-main {
                grid-template-columns: 1fr;
            }

            button {
                width: 100%;
                height: 42px;
            }
        }
    </style>
</head>
<body>
<div class="chat-shell">
    <div class="header">
        <h1 class="title">AI 助手连接测试页</h1>
        <div class="endpoint">
            <label for="apiUrl">流式接口:</label>
            <input id="apiUrl" value="http://localhost:8090/api/ai/coze/query-stream" />
            <span class="hint">有文件时自动切到 query-with-file</span>
        </div>
    </div>

    <div id="status" class="status">已就绪。当前会话会自动复用 sessionId。</div>

    <div id="messages" class="messages">
        <div class="message bot">你好，我是测试助手。请输入一句话并发送，检查 Coze 连接是否成功。</div>
    </div>

    <div class="composer">
        <div class="composer-top">
            <input id="fileInput" class="file-input" type="file" accept=".txt,.md,.doc,.docx,.pdf" />
            <span id="fileName" class="file-name">未选择文件（可选）</span>
        </div>
        <div id="uploadProgressWrap" class="upload-progress-wrap">
            <div class="upload-progress-track">
                <div id="uploadProgressBar" class="upload-progress-bar"></div>
            </div>
            <span id="uploadProgressText" class="upload-progress-text">0%</span>
        </div>
        <div class="composer-main">
            <textarea id="promptInput" placeholder="请输入测试内容，例如：请帮我判断一份劳动合同中可能的风险条款"></textarea>
            <button id="sendBtn" type="button">发送</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    const statusEl = document.getElementById('status');
    const messagesEl = document.getElementById('messages');
    const promptInput = document.getElementById('promptInput');
    const sendBtn = document.getElementById('sendBtn');
    const apiUrlInput = document.getElementById('apiUrl');
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const uploadProgressWrap = document.getElementById('uploadProgressWrap');
    const uploadProgressBar = document.getElementById('uploadProgressBar');
    const uploadProgressText = document.getElementById('uploadProgressText');

    const FILE_API_URL = 'http://localhost:8090/api/ai/coze/query-with-file';
    const FILE_STREAM_API_URL = 'http://localhost:8090/api/ai/coze/query-with-file-stream';

    let sessionId = localStorage.getItem('coze-test-session-id') || crypto.randomUUID();
    localStorage.setItem('coze-test-session-id', sessionId);

    function setStatus(text, isError = false) {
        statusEl.textContent = text;
        statusEl.classList.toggle('error', isError);
    }

    function escapeHtml(text) {
        return text
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function renderMarkdownLite(markdownText) {
        const normalized = normalizeCozeMarkdown(markdownText || '');

        if (window.marked && typeof window.marked.parse === 'function') {
            return window.marked.parse(normalized);
        }

        let html = escapeHtml(normalized);

        html = html.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
        html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
        html = html.replace(/^###\s+(.+)$/gm, '<p><strong>$1</strong></p>');
        html = html.replace(/^##\s+(.+)$/gm, '<p><strong>$1</strong></p>');
        html = html.replace(/^#\s+(.+)$/gm, '<p><strong>$1</strong></p>');
        html = html.replace(/^[-*]\s+(.+)$/gm, '<li>$1</li>');
        html = html.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
        html = html.replace(/<\/ul>\s*<ul>/g, '');
        html = html.replace(/\n{2,}/g, '</p><p>');
        html = `<p>${html.replace(/\n/g, '<br>')}</p>`;
        return html.replace(/<p><\/p>/g, '');
    }

    function normalizeCozeMarkdown(input) {
        if (!input) {
            return '';
        }

        let text = input.replace(/\r\n/g, '\n');
        const fenceMatch = text.trim().match(/^```(?:markdown)?([\s\S]*?)```$/i);
        if (fenceMatch) {
            text = fenceMatch[1].trim();
        }

        text = text.replace(/(#{1,6})(\S)/g, '$1 $2');
        text = text.replace(/([\u4e00-\u9fa5A-Za-z0-9，。；：？！、）\)])-\s+/g, '$1\n- ');
        text = text.replace(/\*\*(\S)/g, '**$1');
        text = text.replace(/\s{3,}/g, '  ');
        return text.trim();
    }

    function appendMessage(text, role, renderMarkdown = false) {
        const message = document.createElement('div');
        message.className = `message ${role}`;
        if (renderMarkdown) {
            message.innerHTML = renderMarkdownLite(text);
        } else {
            message.textContent = text;
        }
        messagesEl.appendChild(message);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return message;
    }

    function updateBotMessage(messageEl, content) {
        messageEl.innerHTML = renderMarkdownLite(content);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function updateBotMessagePlain(messageEl, content) {
        messageEl.textContent = content;
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setUploadProgress(percent, text, visible) {
        uploadProgressWrap.style.display = visible ? 'flex' : 'none';
        if (!visible) {
            return;
        }
        const safePercent = Math.max(0, Math.min(100, Math.floor(percent)));
        uploadProgressBar.style.width = `${safePercent}%`;
        uploadProgressText.textContent = text || `${safePercent}%`;
    }

    function parseSseBlock(blockText) {
        if (!blockText) {
            return null;
        }
        let eventName = 'message';
        const dataLines = [];
        for (const line of blockText.split('\n')) {
            if (line.startsWith('event:')) {
                eventName = line.slice(6).trim();
            }
            if (line.startsWith('data:')) {
                let dataPart = line.slice(5);
                if (dataPart.startsWith(' ')) {
                    dataPart = dataPart.slice(1);
                }
                dataLines.push(dataPart);
            }
        }
        if (dataLines.length === 0) {
            return null;
        }
        return {
            eventName,
            data: dataLines.join('\n')
        };
    }

    async function requestStreamAnswer(prompt, streamApiUrl) {
        return new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            const botMessageEl = appendMessage('正在建立连接...', 'bot', false);

            let processedLength = 0;
            let raw = '';
            let fullAnswer = '';
            let eventCount = 0;
            let doneSeen = false;
            const startedAt = Date.now();
            let firstChunkAt = null;

            let displayedText = '';
            let pendingText = '';
            const flushTimer = window.setInterval(() => {
                if (!pendingText) {
                    return;
                }
                const step = Math.min(4, pendingText.length);
                displayedText += pendingText.slice(0, step);
                pendingText = pendingText.slice(step);
                updateBotMessagePlain(botMessageEl, displayedText);
            }, 16);

            const clearFlushTimer = () => {
                window.clearInterval(flushTimer);
            };

            const finalize = (finalText, doneEventCount) => {
                clearFlushTimer();
                const finalAnswer = finalText || fullAnswer;
                updateBotMessage(botMessageEl, finalAnswer);
                const firstMs = firstChunkAt ? (firstChunkAt - startedAt) : (Date.now() - startedAt);
                const totalMs = Date.now() - startedAt;
                setStatus(`连接成功。首字 ${firstMs}ms，总耗时 ${totalMs}ms，eventCount: ${doneEventCount ?? eventCount}，sessionId: ${sessionId}`);
                resolve();
            };

            const processIncoming = (newText) => {
                if (!newText) {
                    return;
                }
                raw += newText;
                let splitIndex = raw.indexOf('\n\n');
                while (splitIndex !== -1) {
                    const block = raw.slice(0, splitIndex).trim();
                    raw = raw.slice(splitIndex + 2);

                    const parsed = parseSseBlock(block);
                    if (parsed) {
                        if (parsed.eventName === 'ready') {
                            setStatus('连接已建立，等待模型首字...');
                        } else if (parsed.eventName === 'chunk') {
                            if (firstChunkAt === null) {
                                firstChunkAt = Date.now();
                            }
                            fullAnswer += parsed.data;
                            pendingText += parsed.data;
                            eventCount += 1;
                        } else if (parsed.eventName === 'done') {
                            doneSeen = true;
                            try {
                                const donePayload = JSON.parse(parsed.data);
                                if (donePayload.sessionId) {
                                    sessionId = donePayload.sessionId;
                                    localStorage.setItem('coze-test-session-id', sessionId);
                                }
                                finalize(donePayload.answer || fullAnswer, donePayload.eventCount);
                            } catch (_) {
                                finalize(fullAnswer, eventCount);
                            }
                        } else if (parsed.eventName === 'error') {
                            clearFlushTimer();
                            reject(new Error(parsed.data || '流式通道返回错误'));
                        }
                    }
                    splitIndex = raw.indexOf('\n\n');
                }
            };

            xhr.open('POST', streamApiUrl, true);
            xhr.setRequestHeader('Content-Type', 'application/json; charset=utf-8');

            xhr.onprogress = () => {
                const chunk = xhr.responseText.slice(processedLength);
                processedLength = xhr.responseText.length;
                processIncoming(chunk);
            };

            xhr.onload = () => {
                const chunk = xhr.responseText.slice(processedLength);
                processedLength = xhr.responseText.length;
                processIncoming(chunk);

                if (xhr.status < 200 || xhr.status >= 300) {
                    clearFlushTimer();
                    reject(new Error(`流式请求失败，HTTP ${xhr.status}`));
                    return;
                }

                if (!doneSeen) {
                    finalize(fullAnswer, eventCount);
                }
            };

            xhr.onerror = () => {
                clearFlushTimer();
                reject(new Error('流式连接失败，请检查后端服务或网络'));
            };

            xhr.send(JSON.stringify({ prompt, sessionId }));
        });
    }

    async function requestFileStreamAnswer(prompt, selectedFile) {
        return new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            const botMessageEl = appendMessage('文件已上传，正在生成回复...', 'bot', false);

            let processedLength = 0;
            let raw = '';
            let fullAnswer = '';
            let eventCount = 0;
            let doneSeen = false;
            const startedAt = Date.now();
            let firstChunkAt = null;

            let displayedText = '';
            let pendingText = '';
            const flushTimer = window.setInterval(() => {
                if (!pendingText) {
                    return;
                }
                const step = Math.min(4, pendingText.length);
                displayedText += pendingText.slice(0, step);
                pendingText = pendingText.slice(step);
                updateBotMessagePlain(botMessageEl, displayedText);
            }, 16);

            const clearFlushTimer = () => {
                window.clearInterval(flushTimer);
            };

            const finalize = (finalText, doneEventCount) => {
                clearFlushTimer();
                const finalAnswer = finalText || fullAnswer;
                updateBotMessage(botMessageEl, finalAnswer);
                const firstMs = firstChunkAt ? (firstChunkAt - startedAt) : (Date.now() - startedAt);
                const totalMs = Date.now() - startedAt;
                setStatus(`连接成功。首字 ${firstMs}ms，总耗时 ${totalMs}ms，eventCount: ${doneEventCount ?? eventCount}，sessionId: ${sessionId}`);
                resolve();
            };

            const processIncoming = (newText) => {
                if (!newText) {
                    return;
                }
                raw += newText;
                let splitIndex = raw.indexOf('\n\n');
                while (splitIndex !== -1) {
                    const block = raw.slice(0, splitIndex).trim();
                    raw = raw.slice(splitIndex + 2);
                    const parsed = parseSseBlock(block);
                    if (parsed) {
                        if (parsed.eventName === 'ready') {
                            setStatus('上传完成，流式连接已建立...');
                        } else if (parsed.eventName === 'phase') {
                            if (parsed.data === 'extracting') {
                                setStatus('正在提取文件文本...');
                            } else if (parsed.data === 'calling-coze') {
                                setStatus('文本提取完成，正在请求 Coze...');
                            }
                        } else if (parsed.eventName === 'chunk') {
                            if (firstChunkAt === null) {
                                firstChunkAt = Date.now();
                            }
                            fullAnswer += parsed.data;
                            pendingText += parsed.data;
                            eventCount += 1;
                        } else if (parsed.eventName === 'done') {
                            doneSeen = true;
                            try {
                                const donePayload = JSON.parse(parsed.data);
                                if (donePayload.sessionId) {
                                    sessionId = donePayload.sessionId;
                                    localStorage.setItem('coze-test-session-id', sessionId);
                                }
                                finalize(donePayload.answer || fullAnswer, donePayload.eventCount);
                            } catch (_) {
                                finalize(fullAnswer, eventCount);
                            }
                        } else if (parsed.eventName === 'error') {
                            clearFlushTimer();
                            reject(new Error(parsed.data || '文件流式通道返回错误'));
                        }
                    }
                    splitIndex = raw.indexOf('\n\n');
                }
            };

            xhr.open('POST', FILE_STREAM_API_URL, true);

            xhr.upload.onprogress = (event) => {
                if (!event.lengthComputable) {
                    setUploadProgress(50, '上传中...', true);
                    return;
                }
                const percent = (event.loaded / event.total) * 100;
                setUploadProgress(percent, `上传中 ${Math.floor(percent)}%`, true);
            };

            xhr.onprogress = () => {
                const chunk = xhr.responseText.slice(processedLength);
                processedLength = xhr.responseText.length;
                processIncoming(chunk);
            };

            xhr.onload = () => {
                const chunk = xhr.responseText.slice(processedLength);
                processedLength = xhr.responseText.length;
                processIncoming(chunk);

                if (xhr.status < 200 || xhr.status >= 300) {
                    clearFlushTimer();
                    reject(new Error(`请求失败，HTTP ${xhr.status}`));
                    return;
                }

                if (!doneSeen) {
                    finalize(fullAnswer, eventCount);
                }
                setUploadProgress(100, '上传完成 100%', true);
                window.setTimeout(() => setUploadProgress(0, '', false), 500);
            };

            xhr.onerror = () => {
                clearFlushTimer();
                reject(new Error('上传或流式连接失败，请检查网络'));
            };

            const formData = new FormData();
            if (prompt) {
                formData.append('prompt', prompt);
            }
            formData.append('sessionId', sessionId);
            formData.append('file', selectedFile);
            xhr.send(formData);
        });
    }

    async function uploadWithProgress(formData) {
        return new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', FILE_API_URL, true);

            setUploadProgress(0, '上传中 0%', true);

            xhr.upload.onprogress = (event) => {
                if (!event.lengthComputable) {
                    setUploadProgress(50, '上传中...', true);
                    return;
                }
                const percent = (event.loaded / event.total) * 100;
                setUploadProgress(percent, `上传中 ${Math.floor(percent)}%`, true);
            };

            xhr.onload = () => {
                if (xhr.status < 200 || xhr.status >= 300) {
                    reject(new Error(`请求失败，HTTP ${xhr.status}`));
                    return;
                }
                try {
                    const parsed = JSON.parse(xhr.responseText);
                    setUploadProgress(100, '上传完成 100%', true);
                    window.setTimeout(() => setUploadProgress(0, '', false), 500);
                    resolve(parsed);
                } catch (_) {
                    reject(new Error('服务返回格式异常'));
                }
            };

            xhr.onerror = () => {
                reject(new Error('上传失败，请检查网络连接'));
            };

            xhr.send(formData);
        });
    }

    fileInput.addEventListener('change', () => {
        if (fileInput.files && fileInput.files.length > 0) {
            fileName.textContent = `已选文件：${fileInput.files[0].name}`;
            return;
        }
        fileName.textContent = '未选择文件（可选）';
    });

    async function sendMessage() {
        const prompt = promptInput.value.trim();
        const apiUrl = apiUrlInput.value.trim();
        const selectedFile = fileInput.files && fileInput.files[0] ? fileInput.files[0] : null;

        if (!prompt && !selectedFile) {
            setStatus('请输入内容或选择文件后再发送。', true);
            return;
        }
        if (!apiUrl) {
            setStatus('请填写接口地址。', true);
            return;
        }

        const userText = selectedFile ? `${prompt || '（仅文件）'}\n[文件] ${selectedFile.name}` : prompt;
        appendMessage(userText, 'user');
        promptInput.value = '';
        sendBtn.disabled = true;
        setStatus(selectedFile ? '文件分析中，请稍候...' : '流式生成中，请稍候...');

        try {
            if (selectedFile) {
                await requestFileStreamAnswer(prompt, selectedFile);
                fileInput.value = '';
                fileName.textContent = '未选择文件（可选）';
            } else {
                setUploadProgress(0, '', false);
                await requestStreamAnswer(prompt, apiUrl);
            }
        } catch (error) {
            setUploadProgress(0, '', false);
            appendMessage(`请求失败：${error.message}`, 'bot', false);
            setStatus(`连接失败：${error.message}`, true);
        } finally {
            sendBtn.disabled = false;
            promptInput.focus();
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    promptInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    });
</script>
</body>
</html>
