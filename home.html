<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>职途安 - 大学生求职防坑平台</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "PingFang SC", "Segoe UI", Arial, sans-serif;
}

body {
    background: #f7f9fc;
}

.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 40px;
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    z-index: 1000;
}

.logo {
    font-weight: bold;
    font-size: 20px;
    color: #111827;
}

.nav-center {
    display: flex;
    gap: 30px;
}

.nav-center a {
    text-decoration: none;
    color: #334155;
    font-size: 14px;
    position: relative;
}

.nav-center a::after {
    content: '';
    position: absolute;
    bottom: -5px;
    left: 0;
    width: 0;
    height: 2px;
    background: #1677ff;
    transition: 0.3s;
}

.nav-center a:hover::after {
    width: 100%;
}

.nav-right {
    display: flex;
    align-items: center;
    gap: 15px;
}

.nav-btn {
    padding: 6px 14px;
    border-radius: 20px;
    background: #eee;
    text-decoration: none;
    color: #333;
    font-size: 13px;
}

.nav-btn.primary {
    background: #1677ff;
    color: #fff;
}

#user-nav {
    display: none;
    align-items: center;
    gap: 10px;
}

.avatar-wrapper {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    overflow: hidden;
    background: #1677ff;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    cursor: pointer;
}

.avatar-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.hero {
    height: 100vh;
    background: url("assets/images/pages/首屏.png") center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
}

.hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.4));
    pointer-events: none;
}

.hero::before {
    content: '';
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(22,119,255,0.15), transparent 60%);
    animation: moveLight 10s linear infinite;
}

@keyframes moveLight {
    0% { transform: translate(-50%, -50%); }
    50% { transform: translate(0%, 0%); }
    100% { transform: translate(-50%, -50%); }
}

.hero-content {
    position: relative;
    z-index: 2;
    color: #fff;
    text-align: center;
}

.hero h1 {
    font-size: 46px;
    margin-bottom: 10px;
    text-shadow: 0 6px 30px rgba(0,0,0,0.6);
}

.hero p {
    opacity: 0.9;
    margin-bottom: 25px;
}

.btn {
    position: relative;
    overflow: hidden;
    padding: 12px 28px;
    border-radius: 30px;
    text-decoration: none;
    color: #fff;
    border: 1px solid #fff;
    margin: 0 10px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn.primary {
    background: linear-gradient(90deg, #1677ff, #4a90e2);
    border: none;
    box-shadow: 0 6px 20px rgba(22,119,255,0.4);
}

.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(22,119,255,0.5);
}

.btn::after {
    content: '';
    position: absolute;
    width: 0;
    height: 0;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    opacity: 0;
}

.btn:active::after {
    width: 200px;
    height: 200px;
    opacity: 1;
    transition: 0s;
}

.features {
    padding: 80px;
}

.feature-card {
    display: flex;
    align-items: center;
    margin-bottom: 100px;
    gap: 50px;
    opacity: 0;
    transform: translateY(40px);
    transition: 0.6s;
}

.feature-card.show {
    opacity: 1;
    transform: translateY(0);
}

.feature-card.reverse {
    flex-direction: row-reverse;
}

.feature-card img {
    width: 50%;
    border-radius: 16px;
    transition: 0.3s;
}

.feature-card img:hover {
    transform: scale(1.03);
}

.feature-text {
    width: 50%;
}

.feature-text h2 {
    font-size: 28px;
    margin-bottom: 10px;
    color: #1e3a8a;
}

.feature-text p {
    color: #64748b;
    margin-bottom: 20px;
}

.btn.small {
    padding: 8px 18px;
    background: #1677ff;
    border: none;
}

.footer {
    text-align: center;
    padding: 30px;
    background: #111;
    color: #aaa;
}

@media (max-width: 900px) {
    .header {
        padding: 12px 16px;
        gap: 10px;
        flex-wrap: wrap;
    }

    .nav-center {
        order: 3;
        width: 100%;
        gap: 16px;
        justify-content: center;
    }

    .hero h1 {
        font-size: 34px;
    }

    .features {
        padding: 48px 20px;
    }

    .feature-card,
    .feature-card.reverse {
        flex-direction: column;
        gap: 20px;
        margin-bottom: 60px;
    }

    .feature-card img,
    .feature-text {
        width: 100%;
    }
}
</style>

</head>
<body>

<header class="header">
    <div class="logo">职途安</div>

    <nav class="nav-center">
        <a href="ai-chat-test.html" data-auth-required="true">AI助手</a>
        <a href="case.html">案例模拟</a>
        <a href="forum.html">交流论坛</a>
    </nav>

    <div class="nav-right">
        <div id="guest-nav">
            <a href="login.html" class="nav-btn">登录</a>
            <a href="register.html" class="nav-btn primary">注册</a>
        </div>

        <div id="user-nav">
            <div class="avatar-wrapper">
                <img id="headerAvatarImage" alt="头像" style="display:none;">
                <span id="avatar-letter"></span>
            </div>
            <span id="user-name">用户</span>
            <a href="#" id="logout-btn" class="nav-btn">退出</a>
        </div>
    </div>
</header>

<section class="hero">
    <div class="hero-content">
        <h1>让每一次求职，都更安全</h1>
        <p>识别陷阱 · 模拟场景 · 真实交流</p>

        <a href="register.html" class="btn primary">立即注册</a>
        <a href="ai-chat-test.html" class="btn" data-auth-required="true">体验AI助手</a>

    </div>
</section>

<section class="features">

    <div class="feature-card">
        <img src="assets/images/pages/ai助手.png" alt="AI助手">
        <div class="feature-text">
            <h2>AI合同检测</h2>
            <p>上传合同，智能识别风险条款。</p>
            <a href="ai-chat-test.html" class="btn small" data-auth-required="true">进入</a>
        </div>
    </div>

    <div class="feature-card reverse">
        <img src="assets/images/pages/案例模拟.jpg" alt="案例模拟">
        <div class="feature-text">
            <h2>案例模拟</h2>
            <p>模拟真实求职，提前避坑。</p>
            <a href="case.html" class="btn small">进入</a>
        </div>
    </div>

    <div class="feature-card">
        <img src="assets/images/pages/交流论坛.jpg" alt="交流论坛">
        <div class="feature-text">
            <h2>交流论坛</h2>
            <p>分享经验，获取真实建议。</p>
            <a href="forum.html" class="btn small">进入</a>
        </div>
    </div>

</section>

<footer class="footer">
    © 职途安 - 大学生求职防坑平台
</footer>

<script>
const cards = document.querySelectorAll('.feature-card');
window.addEventListener('scroll', () => {
    const trigger = window.innerHeight * 0.85;
    cards.forEach(card => {
        if (card.getBoundingClientRect().top < trigger) {
            card.classList.add('show');
        }
    });
});

function getToken() {
    return localStorage.getItem('token') || sessionStorage.getItem('token') || '';
}

function getUsername() {
    return localStorage.getItem('username') || sessionStorage.getItem('username') || '';
}

function requireLogin(targetUrl, featureName) {
    if (getToken()) {
        window.location.href = targetUrl;
        return;
    }
    const redirect = encodeURIComponent(targetUrl);
    const action = encodeURIComponent(featureName || '该功能');
    const goLogin = window.confirm((featureName || '该功能') + '需要登录后使用，是否前往登录页？');
    if (goLogin) {
        window.location.href = 'login.html?redirect=' + redirect + '&action=' + action;
    }
}

const guestNav = document.getElementById('guest-nav');
const userNav = document.getElementById('user-nav');
const userNameEl = document.getElementById('user-name');
const avatarLetterEl = document.getElementById('avatar-letter');
const headerAvatarImage = document.getElementById('headerAvatarImage');
const avatarWrapper = document.querySelector('.avatar-wrapper');

function getAvatarDataUrl() {
    return localStorage.getItem('userAvatar') || '';
}

window.addEventListener('load', () => {
    const token = getToken();
    const name = getUsername();

    if (token) {
        guestNav.style.display = 'none';
        userNav.style.display = 'flex';
        const displayName = name || 'User';
        userNameEl.textContent = displayName;
        const avatarUrl = getAvatarDataUrl();
        if (avatarUrl) {
            headerAvatarImage.src = avatarUrl;
            headerAvatarImage.style.display = 'block';
            avatarLetterEl.style.display = 'none';
        } else {
            headerAvatarImage.style.display = 'none';
            avatarLetterEl.style.display = 'inline';
            avatarLetterEl.textContent = displayName.charAt(0).toUpperCase();
        }
    }
});

avatarWrapper.addEventListener('click', () => {
    window.location.href = 'profile.html';
});

document.getElementById('logout-btn').onclick = (event) => {
    event.preventDefault();
    localStorage.removeItem('token');
    localStorage.removeItem('username');
    sessionStorage.removeItem('token');
    sessionStorage.removeItem('username');
    location.reload();
};

document.querySelectorAll('[data-auth-required="true"]').forEach((el) => {
    el.addEventListener('click', (event) => {
        event.preventDefault();
        const target = el.getAttribute('href');
        const label = el.textContent.trim();
        requireLogin(target, label);
    });
});
</script>

</body>
</html>
