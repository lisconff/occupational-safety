<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 职途安</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <h2>登录职途安</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginUsername">用户名/邮箱</label>
                    <input type="text" id="loginUsername" name="loginUsername" placeholder="请输入用户名或邮箱" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">密码</label>
                    <input type="password" id="loginPassword" name="loginPassword" placeholder="请输入密码" required>
                    <div class="error-message" id="loginError">用户名或密码错误</div>
                </div>
                <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    <label for="rememberMe" style="margin: 0; font-size: 14px;">记住我</label>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; font-size: 16px;">登录</button>
            </form>
            <div class="auth-footer">
                还没有账号？<a href="register.html">立即注册</a>
            </div>
        </div>
    </div>

    <script>
        // 表单提交
        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            // 这里可以添加AJAX请求，对接Java17后端的登录接口
            // 模拟登录验证
            if (username && password) {
                alert('登录成功！即将跳转到首页');
                window.location.href = 'index.html';
            } else {
                loginError.style.display = 'block';
            }
        });
    </script>
</body>
</html>
