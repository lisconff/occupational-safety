server:
  port: ${SERVER_PORT:8090}

spring:
  application:
    name: occupational-safety-backend
  datasource:
    url: jdbc:h2:mem:zhituan;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
