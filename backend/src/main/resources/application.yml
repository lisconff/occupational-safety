server:
  port: ${SERVER_PORT:8090}

spring:
  profiles:
    active: local
  application:
    name: occupational-safety-backend
  datasource:
    url: jdbc:mysql://localhost:3306/occupational_safety?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${DB_PASSWORD:root}  # 这里写假密码，真密码写在 application-local.yml 里
  # h2:
  #   console:
  #     enabled: true
  #     path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 25MB

forum:
  upload-dir: ${FORUM_UPLOAD_DIR:uploads/forum-posts}

coze:
  stream-url: ${COZE_STREAM_URL:https://k7zcnck7q6.coze.site/stream_run}
  token: ${COZE_TOKEN:}
  project-id: ${COZE_PROJECT_ID:}
  session-id: ${COZE_SESSION_ID:}
  connect-timeout-seconds: ${COZE_CONNECT_TIMEOUT_SECONDS:15}
  read-timeout-seconds: ${COZE_READ_TIMEOUT_SECONDS:120}
