<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>职途安 - 交流论坛</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
    body{background:linear-gradient(135deg,#F0F9FF,#E6F7FF);background-attachment:fixed;color:#334155;overflow:hidden;}

    /* 顶部导航 —— 永久固定 */
    .navbar{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      backdrop-filter:blur(12px);
      background:rgba(255,255,255,0.15);
      border-bottom:1px solid rgba(255,255,255,0.3);
      padding:20px 60px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      z-index:999;
    }
    .logo{font-size:26px;font-weight:700;color:#1D4ED8}
    .nav-menu a{margin:0 20px;text-decoration:none;color:#1E3A8A;font-weight:500;}

    /* 左侧功能栏 —— 100% 固定不动 */
    .sidebar{
      position: fixed !important;
      top: 100px !important;
      left: 30px !important;
      width: 280px !important;
      height: calc(100vh - 120px) !important;
      overflow: hidden !important;
      z-index: 99 !important;
    }

    .user-card{
      backdrop-filter:blur(12px);
      background:rgba(255,255,255,0.15);
      border:1px solid rgba(255,255,255,0.3);
      border-radius:20px;
      padding:25px;
      text-align:center;
    }
    .avatar{
      width:80px;
      height:80px;
      background:#1D4ED8;
      color:white;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:32px;
      margin:0 auto 10px;
    }
    .username{font-size:18px;font-weight:600;color:#1E3A8A;margin-top:8px}

    .func-menu{
      backdrop-filter:blur(12px);
      background:rgba(255,255,255,0.15);
      border:1px solid rgba(255,255,255,0.3);
      border-radius:20px;
      padding:20px;
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-top:15px;
    }
    .menu-item{
      padding:14px 16px;
      border-radius:14px;
      cursor:pointer;
      font-weight:500;
      color:#1E3A8A;
    }
    .menu-item.active{background:#1D4ED8;color:white}
    .menu-item:hover{background:rgba(29,78,216,0.1)}

    /* 右侧内容区 —— 只有这里滚动 */
    .post-area{
      position:fixed;
      top:100px;
      left:340px;
      right:30px;
      bottom:30px;
      overflow-y:auto;
      padding:0 20px 20px;
    }

    /* ===================== 核心：标签栏吸顶固定（小红书效果） ===================== */
    .tag-nav{
      display:flex;
      gap:12px;
      margin-bottom:20px;
      overflow-x:auto;
      white-space:nowrap;
      
      position: sticky;    /* 吸顶关键 */
      top: 0px;            /* 贴在顶部 */
      z-index: 10;         /* 保证在最上层 */
      
      background:linear-gradient(135deg,#F0F9FF,#E6F7FF);
      padding:12px 0;
    }
    .tag-nav::-webkit-scrollbar{height:0;}
    .tag-item{
      padding:10px 20px;
      background:rgba(255,255,255,0.1);
      border:1px solid rgba(255,255,255,0.2);
      border-radius:20px;
      cursor:pointer;
    }
    .tag-item.active{background:#1D4ED8;color:white}

    /* 瀑布流 */
    .masonry-grid{
      column-count:3;
      column-gap:20px;
    }
    .masonry-item{
      break-inside:avoid;
      background:rgba(255,255,255,0.15);
      border:1px solid rgba(255,255,255,0.3);
      border-radius:20px;
      padding:15px;
      margin-bottom:20px;
    }
    .post-img{
      width:100%;
      height:200px;
      object-fit:cover;
      border-radius:12px;
      margin-bottom:10px;
    }
    .post-title{font-weight:600;color:#1E3A8A;margin-bottom:6px;}
    .post-desc{font-size:13px;color:#666;margin-bottom:8px;}
  </style>
</head>

<body>

<!-- 顶部固定 -->
<div class="navbar">
  <div class="logo">职途安</div>
  <div class="nav-menu">
    <a href="index.html">首页</a>
    <a href="forum.html">论坛</a>
    <a href="login.html">登录</a>
    <a href="register.html">注册</a>
  </div>
</div>

<!-- 左侧固定 -->
<div class="sidebar">
  <div class="user-card">
    <div class="avatar">途</div>
    <div class="username">求职学生001</div>
  </div>

  <div class="func-menu">
    <div class="menu-item active">🔥 热门帖子</div>
    <div class="menu-item">📝 发布帖子</div>
    <div class="menu-item">📂 我的帖子</div>
    <div class="menu-item">❤️ 我的收藏</div>
    <div class="menu-item">📊 浏览记录</div>
    <div class="menu-item">⚙️ 个人设置</div>
  </div>
</div>

<!-- 右侧滚动区 -->
<div class="post-area">
  <div class="tag-nav">
    <div class="tag-item active" data-tag="all">全部</div>
    <div class="tag-item" data-tag="骗局曝光">骗局曝光</div>
    <div class="tag-item" data-tag="合同避坑">合同避坑</div>
    <div class="tag-item" data-tag="劳动法规">劳动法规</div>
    <div class="tag-item" data-tag="经验分享">经验分享</div>
  </div>

  <div class="masonry-grid" id="postWrap"></div>
</div>

<script>
  const jobImages = [
    "https://images.unsplash.com/photo-1573497620053-ea5300f94f21?w=400&h=300&fit=crop",
    "https://images.unsplash.com/photo-1556761175-5973dc0f32e7?w=400&h=300&fit=crop",
    "https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=400&h=300&fit=crop",
    "https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?w=400&h=300&fit=crop",
    "https://images.unsplash.com/photo-1560264280-0437438ff273?w=400&h=300&fit=crop",
    "https://images.unsplash.com/photo-1551836022-47429b7265ae?w=400&h=300&fit=crop"
  ];

  function generatePosts() {
    const tags = ["骗局曝光", "合同避坑", "劳动法规", "经验分享"];
    const list = [];
    for (let i=1; i<=30; i++) {
      list.push({
        title: `求职避坑指南第${i}期`,
        desc: "这是自动生成的演示帖子，滚动时标签栏会固定在顶部",
        img: jobImages[i%6],
        tag: tags[Math.floor(Math.random()*4)],
        likes: Math.floor(Math.random()*5000)
      });
    }
    return list.sort((a,b)=>b.likes - a.likes);
  }

  function renderPosts(posts) {
    const wrap = document.getElementById("postWrap");
    wrap.innerHTML = posts.map(p=>`
      <div class="masonry-item">
        <img class="post-img" src="${p.img}">
        <div class="post-title">${p.title}</div>
        <div class="post-desc">${p.desc}</div>
        <div style="font-size:12px;color:#999">${p.tag} · 点赞 ${p.likes}</div>
      </div>
    `).join('');
  }

  const allPosts = generatePosts();
  renderPosts(allPosts);

  document.querySelectorAll('.tag-item').forEach(t=>{
    t.onclick = ()=>{
      document.querySelectorAll('.tag-item').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      const tag = t.dataset.tag;
      renderPosts(tag==='all' ? allPosts : allPosts.filter(p=>p.tag===tag));
    }
  });
</script>
</body>
</html>
