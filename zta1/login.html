<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 职途安</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #F0F9FF 0%, #E6F7FF 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-box {
            width: 450px;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            padding: 60px 50px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.08);
        }
        .login-title {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: #1D4ED8;
            margin-bottom: 40px;
        }
        .input-group {
            margin-bottom: 25px;
        }
        .input-label {
            display: block;
            font-size: 15px;
            color: #334155;
            margin-bottom: 10px;
            font-weight: 500;
        }
        .login-input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.2);
            font-size: 16px;
            outline: none;
        }
        .login-input:focus {
            border-color: #1D4ED8;
            background: rgba(255, 255, 255, 0.3);
        }
        .login-btn {
            width: 100%;
            padding: 18px;
            background: #1D4ED8;
            color: #fff;
            border: none;
            border-radius: 15px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .login-btn:hover {
            transform: scale(1.03);
            background: #1E40AF;
        }
        .link-tip {
            text-align: center;
            margin-top: 30px;
            font-size: 15px;
            color: #64748B;
        }
        .link-tip a {
            color: #1D4ED8;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 class="login-title">职途安 - 登录</h2>
        <div class="input-group">
            <label class="input-label">账号</label>
            <input type="text" class="login-input" placeholder="请输入手机号/用户名">
        </div>
        <div class="input-group">
            <label class="input-label">密码</label>
            <input type="password" class="login-input" placeholder="请输入密码">
        </div>
        <button class="login-btn">登录</button>
        <div class="link-tip">没有账号？<a href="register.html">立即注册</a></div>
    </div>
</body>
</html>
