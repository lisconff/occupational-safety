<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
<link rel="icon" type="image/png" href="assets/images/scenarios/AI头像-圆形.png">
<title>职途安</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Segoe UI", "Microsoft YaHei", sans-serif; }
    body { background: linear-gradient(150deg, #eef6ff 0%, #dbeafe 48%, #eff6ff 100%); color: #0f172a; min-height: 100vh; }
    .container { max-width: 980px; margin: 0 auto; padding: 28px 16px; }
    .card { background: rgba(255,255,255,0.9); border: 1px solid #dbeafe; border-radius: 16px; box-shadow: 0 10px 24px rgba(30,64,175,0.08); }
    .top { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid #e2e8f0; }
    .top h1 { font-size: 20px; color: #1e3a8a; }
    .btn { border: 1px solid #93c5fd; background: #fff; color: #1e40af; border-radius: 999px; padding: 7px 14px; cursor: pointer; }
    .list { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
    .item { border: 1px solid #e2e8f0; border-radius: 12px; background: #fff; padding: 12px; cursor: pointer; }
    .item:hover { border-color: #93c5fd; }
    .title { font-size: 15px; color: #1e3a8a; font-weight: 700; margin-bottom: 6px; }
    .meta { font-size: 12px; color: #64748b; display: flex; gap: 10px; flex-wrap: wrap; }
    .empty { color: #64748b; text-align: center; padding: 24px 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="top">
        <h1>我的点赞</h1>
        <button class="btn" id="backBtn">返回论坛</button>
      </div>
      <div class="list" id="list"></div>
    </div>
  </div>

  <script>
    const API_BASE = "https://occupational-safety.onrender.com";
    function getUsername() { return localStorage.getItem("username") || sessionStorage.getItem("username") || ""; }
    function getToken() { return localStorage.getItem("token") || sessionStorage.getItem("token") || ""; }
    function escapeHtml(text) { return (text || "").toString().replace(/[&<>\"]/g, (ch) => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[ch])); }
    function formatDate(value) { if (!value) return "刚刚"; const d = new Date(value); if (Number.isNaN(d.getTime())) return value; const pad = (n) => String(n).padStart(2, "0"); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())+" "+pad(d.getHours())+":"+pad(d.getMinutes()); }

    async function load() {
      const wrap = document.getElementById("list");
      const username = getUsername();
      if (!username || !getToken()) { wrap.innerHTML = '<div class="empty">请先登录后查看点赞</div>'; return; }
      wrap.innerHTML = '<div class="empty">正在加载...</div>';
      try {
        const response = await fetch(API_BASE + "/api/forum/users/" + encodeURIComponent(username) + "/likes", { headers: { Authorization: "Bearer " + getToken() } });
        const data = await response.json();
        if (!(data && data.code === 200 && Array.isArray(data.data))) { wrap.innerHTML = '<div class="empty">加载失败</div>'; return; }
        if (!data.data.length) { wrap.innerHTML = '<div class="empty">暂无点赞帖子</div>'; return; }
        wrap.innerHTML = data.data.map((post) => '<div class="item" data-id="' + escapeHtml(post.postId) + '">' + '<div class="title">' + escapeHtml(post.title || "未命名帖子") + '</div>' + '<div class="meta"><span>作者：' + escapeHtml(post.userId || "匿名") + '</span><span>点赞：' + (post.likeCount || 0) + '</span><span>' + escapeHtml(formatDate(post.createdAt)) + '</span></div>' + '</div>').join("");
        document.querySelectorAll('.item').forEach((el) => { el.addEventListener('click', () => { const id = el.getAttribute('data-id'); if (id) window.location.href = 'post-detail.html?id=' + encodeURIComponent(id); }); });
      } catch (err) { wrap.innerHTML = '<div class="empty">网络错误，加载失败</div>'; }
    }
    document.getElementById('backBtn').addEventListener('click', () => window.location.href = 'forum.html');
    load();
  </script>
</body>
</html>
