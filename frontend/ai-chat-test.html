<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 助手</title>
    <style>
        :root {
            --bg-1: #F0F9FF;
            --bg-2: #E6F7FF;
            --panel: rgba(255, 255, 255, 0.18);
            --line: rgba(255, 255, 255, 0.35);
            --text: #334155;
            --muted: #64748B;
            --brand: #1D4ED8;
            --brand-hover: #1E40AF;
            --user-bubble: #DBEAFE;
            --bot-bubble: #F8FAFC;
            --danger: #d93025;
        }

        * {
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 92px 12px 28px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 40px;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #dbeafe;
            box-shadow: 0 6px 18px rgba(30, 64, 175, 0.08);
            z-index: 1000;
        }

        .logo {
            font-weight: bold;
            font-size: 20px;
            color: #111827;
        }

        .nav-center {
            display: flex;
            gap: 30px;
        }

        .nav-center a {
            text-decoration: none;
            color: #334155;
            font-size: 14px;
            position: relative;
        }

        .nav-center a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: #1677ff;
            transition: 0.3s;
        }

        .nav-center a:hover::after {
            width: 100%;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn {
            padding: 6px 14px;
            border-radius: 20px;
            background: #eef2ff;
            text-decoration: none;
            color: #1e3a8a;
            font-size: 13px;
            border: 1px solid #c7d2fe;
            cursor: pointer;
        }

        .nav-btn.primary {
            background: #1d4ed8;
            color: #fff;
            border-color: #1d4ed8;
        }

        #guest-nav,
        #user-nav {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #user-nav {
            display: none;
        }

        .avatar-wrapper {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            overflow: hidden;
            background: #1d4ed8;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            cursor: pointer;
        }

        .avatar-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .chat-shell {
            width: min(1080px, 100%);
            margin: 0 auto;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 22px;
            backdrop-filter: blur(12px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .topbar {
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.2);
            border-bottom: 1px solid var(--line);
            flex-wrap: wrap;
            gap: 8px;
        }

        .brand {
            font-size: 24px;
            font-weight: 700;
            color: var(--brand);
        }

        .quick-nav {
            display: flex;
            gap: 16px;
        }

        .quick-nav a {
            text-decoration: none;
            color: #1E3A8A;
            font-weight: 500;
        }

        .quick-nav a:hover {
            color: var(--brand);
        }

        .chat-titlebar {
            padding: 14px 20px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.14);
        }

        .title {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            color: #1E3A8A;
        }

        .hint {
            margin-top: 4px;
            font-size: 13px;
            color: var(--muted);
        }

        .status {
            display: none;
        }

        .status.error {
            color: var(--danger);
        }

        .messages {
            height: 460px;
            overflow-y: auto;
            padding: 18px 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.42) 0%, rgba(255, 255, 255, 0.22) 100%);
        }

        .message-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            width: 100%;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        .avatar.bot {
            background: linear-gradient(135deg, #1D4ED8 0%, #2563EB 100%);
        }

        .avatar.user {
            background: linear-gradient(135deg, #0EA5E9 0%, #1D4ED8 100%);
        }

        .message-bubble {
            width: fit-content;
            max-width: min(40em, calc(100% - 84px));
            min-width: 0;
            padding: 10px 12px;
            border-radius: 14px;
            line-height: 1.6;
            font-size: 16px;
            white-space: pre-wrap;
            word-break: break-word;
            border: 1px solid transparent;
        }

        .message-bubble p {
            margin: 0 0 8px 0;
            font-size: 16px;
            font-weight: 400;
            line-height: 1.6;
        }

        .message-bubble p:last-child {
            margin-bottom: 0;
        }

        .message-bubble h1,
        .message-bubble h2,
        .message-bubble h3,
        .message-bubble h4,
        .message-bubble h5,
        .message-bubble h6,
        .message-bubble strong {
            margin: 0 0 8px 0;
            font-size: 16px;
            line-height: 1.6;
            font-weight: 600;
        }

        .message-bubble li {
            font-size: 16px;
            line-height: 1.6;
        }

        .message-bubble pre {
            margin: 8px 0;
            padding: 8px;
            background: rgba(0, 0, 0, 0.06);
            border-radius: 8px;
            overflow-x: auto;
            font-size: 13px;
        }

        .message-bubble code {
            font-family: Consolas, monospace;
        }

        .message-bubble ul {
            margin: 6px 0 6px 20px;
            padding: 0;
        }

        .message-bubble a {
            color: #0f5dcc;
            text-decoration: underline;
        }

        .message-row.user .message-bubble {
            background: var(--user-bubble);
            border-color: #c6dcff;
        }

        .message-row.bot .message-bubble {
            background: var(--bot-bubble);
            border-color: #e3e6ea;
        }

        .composer {
            border-top: 1px solid var(--line);
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(255, 255, 255, 0.45);
        }

        .composer-top {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .composer-main {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: stretch;
        }

        .file-input {
            max-width: 100%;
            font-size: 14px;
        }

        .file-name {
            font-size: 13px;
            color: var(--muted);
        }

        .upload-progress-wrap {
            width: min(560px, 100%);
            display: none;
            align-items: center;
            gap: 8px;
        }

        .upload-progress-track {
            flex: 1;
            height: 8px;
            background: #e9eef7;
            border-radius: 99px;
            overflow: hidden;
        }

        .upload-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #1677ff, #59a2ff);
            transition: width 0.15s linear;
        }

        .upload-progress-text {
            font-size: 12px;
            color: var(--muted);
            min-width: 88px;
            text-align: right;
        }

        textarea {
            resize: none;
            height: 110px;
            border-radius: 10px;
            border: 1px solid #BFDBFE;
            padding: 12px;
            font-size: 16px;
            line-height: 1.5;
            background: rgba(255, 255, 255, 0.92);
        }

        button {
            border: none;
            border-radius: 10px;
            background: var(--brand);
            color: #fff;
            width: 110px;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            background: var(--brand-hover);
        }

        button:disabled {
            background: #9aa7bd;
            cursor: not-allowed;
        }

        @media (max-width: 680px) {
            .header {
                padding: 12px 16px;
            }

            .nav-center {
                gap: 14px;
            }

            .topbar {
                padding: 14px 16px;
            }

            .brand {
                font-size: 20px;
            }

            .messages {
                height: 55vh;
            }

            .composer-main {
                grid-template-columns: 1fr;
            }

            button {
                width: 100%;
                height: 42px;
            }
        }
    </style>
</head>
<body>
<header class="header">
    <div class="logo">职途安</div>
    <nav class="nav-center">
        <a href="ai-chat-test.html" data-auth-required="true">AI助手</a>
        <a href="case.html">案例模拟</a>
        <a href="forum.html">交流论坛</a>
    </nav>
    <div class="nav-right">
        <div id="guest-nav">
            <a href="login.html?redirect=ai-chat-test.html" class="nav-btn">登录</a>
            <a href="register.html?redirect=ai-chat-test.html" class="nav-btn primary">注册</a>
        </div>
        <div id="user-nav">
            <div class="avatar-wrapper" id="topAvatarWrap">
                <img id="topAvatarImage" alt="头像" style="display:none;">
                <span id="topAvatarLetter">游</span>
            </div>
            <span id="topUserName" style="font-size:13px;color:#1e3a8a;">用户</span>
            <button id="logoutBtn" class="nav-btn">退出</button>
        </div>
    </div>
</header>

<div class="chat-shell">
    <input id="apiUrl" type="hidden" value="http://localhost:8090/api/ai/coze/query-stream" />
    <div id="status" class="status" aria-hidden="true"></div>

    <div id="messages" class="messages">
        <div class="message-row bot">
            <div class="avatar bot">AI</div>
            <div class="message-bubble">你好，我是AI助手。</div>
        </div>
    </div>

    <div class="composer">
        <div class="composer-top">
            <input id="fileInput" class="file-input" type="file" accept=".txt,.md,.doc,.docx,.pdf" />
            <span id="fileName" class="file-name">未选择文件（可选）</span>
        </div>
        <div id="uploadProgressWrap" class="upload-progress-wrap">
            <div class="upload-progress-track">
                <div id="uploadProgressBar" class="upload-progress-bar"></div>
            </div>
            <span id="uploadProgressText" class="upload-progress-text">0%</span>
        </div>
        <div class="composer-main">
            <textarea id="promptInput" placeholder="请输入测试内容，例如：请帮我判断一份劳动合同中可能的风险条款"></textarea>
            <button id="sendBtn" type="button">发送</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    if (window.marked && typeof window.marked.setOptions === 'function') {
        window.marked.setOptions({
            gfm: true,
            breaks: true
        });
    }

    const statusEl = document.getElementById('status');
    const messagesEl = document.getElementById('messages');
    const promptInput = document.getElementById('promptInput');
    const sendBtn = document.getElementById('sendBtn');
    const apiUrlInput = document.getElementById('apiUrl');
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const uploadProgressWrap = document.getElementById('uploadProgressWrap');
    const uploadProgressBar = document.getElementById('uploadProgressBar');
    const uploadProgressText = document.getElementById('uploadProgressText');

    const FILE_API_URL = 'http://localhost:8090/api/ai/coze/query-with-file';
    const FILE_STREAM_API_URL = 'http://localhost:8090/api/ai/coze/query-with-file-stream';
    const CHAT_HISTORY_API_URL = 'http://localhost:8090/api/ai/coze/history';

    function getToken() {
        return localStorage.getItem('token') || sessionStorage.getItem('token') || '';
    }

    function getUsername() {
        return localStorage.getItem('username') || sessionStorage.getItem('username') || '用户';
    }

    function getAvatarDataUrl() {
        return localStorage.getItem('userAvatar') || '';
    }

    function isLoggedIn() {
        return Boolean(getToken());
    }

    function requireLogin(actionName) {
        if (isLoggedIn()) {
            return true;
        }
        const goLogin = window.confirm(actionName + '需要登录后使用，是否前往登录页？');
        if (goLogin) {
            const redirect = encodeURIComponent('ai-chat-test.html');
            const action = encodeURIComponent(actionName);
            window.location.href = 'login.html?redirect=' + redirect + '&action=' + action;
        }
        return false;
    }

    let sessionId = localStorage.getItem('coze-test-session-id') || crypto.randomUUID();
    localStorage.setItem('coze-test-session-id', sessionId);

    const CHAT_HISTORY_LIMIT = 30;
    let chatHistory = [];

    function getAuthToken() {
        return getToken();
    }

    function renderTopRightUser() {
        const guestNav = document.getElementById('guest-nav');
        const userNav = document.getElementById('user-nav');
        const nameEl = document.getElementById('topUserName');
        const avatarImg = document.getElementById('topAvatarImage');
        const avatarLetter = document.getElementById('topAvatarLetter');

        const token = getToken();
        const username = getUsername();
        const avatarUrl = getAvatarDataUrl();

        if (token) {
            guestNav.style.display = 'none';
            userNav.style.display = 'flex';
            nameEl.textContent = username;
            if (avatarUrl) {
                avatarImg.src = avatarUrl;
                avatarImg.style.display = 'block';
                avatarLetter.style.display = 'none';
            } else {
                avatarImg.style.display = 'none';
                avatarLetter.style.display = 'inline';
                avatarLetter.textContent = (username || '游').charAt(0).toUpperCase();
            }
        } else {
            guestNav.style.display = 'flex';
            userNav.style.display = 'none';
        }
    }

    function applyAuthHeader(xhr) {
        const token = getAuthToken();
        if (token) {
            xhr.setRequestHeader('Authorization', 'Bearer ' + token);
        }
    }

    function createHistoryId() {
        if (window.crypto && typeof window.crypto.randomUUID === 'function') {
            return window.crypto.randomUUID();
        }
        return 'h-' + Date.now() + '-' + Math.floor(Math.random() * 1000000);
    }

    function saveChatHistory() {
        if (chatHistory.length > CHAT_HISTORY_LIMIT) {
            chatHistory = chatHistory.slice(-CHAT_HISTORY_LIMIT);
        }
    }

    function addHistoryEntry(role, text, renderMarkdown) {
        const entry = {
            id: createHistoryId(),
            role,
            text,
            renderMarkdown: Boolean(renderMarkdown),
            ts: Date.now()
        };
        chatHistory.push(entry);
        saveChatHistory();
        return entry.id;
    }

    function updateHistoryEntryById(id, text, renderMarkdown) {
        if (!id) {
            return;
        }
        const entry = chatHistory.find(item => item.id === id);
        if (!entry) {
            return;
        }
        entry.text = text;
        entry.renderMarkdown = Boolean(renderMarkdown);
        saveChatHistory();
    }

    function setStatus(text, isError = false) {
        statusEl.textContent = text;
        statusEl.classList.toggle('error', isError);
    }

    function escapeHtml(text) {
        return text
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function renderMarkdownLite(markdownText) {
        const normalized = applyReadableLineBreaks(normalizeCozeMarkdown(markdownText || ''));

        if (window.marked && typeof window.marked.parse === 'function') {
            const normalizedForMarked = normalized
                .replace(/\u2028/g, '\n')
                .replace(/\u2029/g, '\n');

            // 强制保留单行换行：把段内单换行转换为 Markdown 的硬换行
            const markdownWithForcedBreaks = normalizedForMarked
                .split(/\n\n+/)
                .map(part => part.replace(/\n/g, '  \n'))
                .join('\n\n');

            return window.marked.parse(markdownWithForcedBreaks);
        }

        let html = escapeHtml(normalized);

        html = html.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
        html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
        html = html.replace(/^###\s+(.+)$/gm, '<p><strong>$1</strong></p>');
        html = html.replace(/^##\s+(.+)$/gm, '<p><strong>$1</strong></p>');
        html = html.replace(/^#\s+(.+)$/gm, '<p><strong>$1</strong></p>');
        html = html.replace(/^[-*]\s+(.+)$/gm, '<li>$1</li>');
        html = html.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
        html = html.replace(/<\/ul>\s*<ul>/g, '');
        html = html.replace(/\n{2,}/g, '</p><p>');
        html = `<p>${html.replace(/\n/g, '<br>')}</p>`;
        return html.replace(/<p><\/p>/g, '');
    }

    function applyReadableLineBreaks(text) {
        if (!text) {
            return text;
        }

        // 代码块/列表/标题等结构化内容不做自动切分，避免破坏格式。
        if (/```|^\s*[-*]\s+|^\s*#{1,6}\s+/m.test(text)) {
            return text;
        }

        const normalizedSource = text
            .replace(/\u3000/g, ' ')
            .replace(/\u00A0/g, ' ')
            .replace(/\r\n/g, '\n')
            .replace(/\r/g, '\n');

        function insertBreakBeforeMarker(input, regex) {
            return input.replace(regex, (match, offset, whole) => {
                let cursor = offset - 1;
                while (cursor >= 0 && /[ \t]/.test(whole[cursor])) {
                    cursor--;
                }
                const prev = cursor >= 0 ? whole[cursor] : '';

                if (offset === 0 || prev === '\n') {
                    return match;
                }

                // 避免把已经正确合并的括号编号再次拆开：例如 （1）
                if (prev === '（' || prev === '(') {
                    return match;
                }

                // 避免把法条标题等内联括号序号拆开：例如《...解释（一）》
                if ((match.startsWith('（') || match.startsWith('(')) && /[\u4e00-\u9fa5A-Za-z0-9》]/.test(prev)) {
                    return match;
                }

                return '\n' + match;
            });
        }

        // 只做最小化结构断行，不做长度硬切。
        const markerPatterns = [
            /第\s*[一二三四五六七八九十百千万0-9]+\s*条/g,
            /[（(]\s*[一二三四五六七八九十百千万0-9]+\s*[）)](?:\s*\d+款)?/g,
            /[①②③④⑤⑥⑦⑧⑨⑩⑪⑫⑬⑭⑮⑯⑰⑱⑲⑳]/g,
            /[一二三四五六七八九十]+、/g,
            /\d+、/g,
            /\d+[）)](?=\s*[\u4e00-\u9fa5A-Za-z(（])/g,
            /\d+\.(?=\s*[\u4e00-\u9fa5A-Za-z(（])/g,
            /[A-Za-z][\.)）](?=\s*[\u4e00-\u9fa5A-Za-z(（])/g,
            /风险状态：/g,
            /问题分析：/g,
            /法律依据：/g,
            /修改建议：/g,
            /主要风险：/g,
            /维权建议：/g,
            /签约建议：/g,
            /原文内容：/g
        ];

        let output = normalizedSource
            // 仅修复极端破碎编号： （\n1） -> （1）
            .replace(/[（(]\s*\n+\s*([一二三四五六七八九十百千万0-9]+)\s*[）)]/g, '（$1）')
            .replace(/[（(]\s*([一二三四五六七八九十百千万0-9]+)\s*\n+\s*[）)]/g, '（$1）')
            // 修复法条标题中的错误断行： 《...解释\n（一）...》
            .replace(/《([^》\n]*)\n+([（(][一二三四五六七八九十百千万0-9]+[）)])([^》\n]*)》/g, '《$1$2$3》');

        for (const pattern of markerPatterns) {
            output = insertBreakBeforeMarker(output, pattern);
        }

        return output
            .replace(/\n{3,}/g, '\n\n')
            .replace(/^\n+/, '')
            .trim();
    }

    function normalizeCozeMarkdown(input) {
        if (!input) {
            return '';
        }

        let text = input.replace(/\r\n/g, '\n');
        text = text.replace(/\u2028/g, '\n').replace(/\u2029/g, '\n');
        const fenceMatch = text.trim().match(/^```(?:markdown)?([\s\S]*?)```$/i);
        if (fenceMatch) {
            text = fenceMatch[1].trim();
        }

        text = text.replace(/(#{1,6})(\S)/g, '$1 $2');
        text = text.replace(/([\u4e00-\u9fa5A-Za-z0-9，。；：？！、）\)])-\s+/g, '$1\n- ');
        text = text.replace(/\\r\\n/g, '\n');
        text = text.replace(/\\n/g, '\n');
        // 强制修复括号编号被拆行：
        // （\n1） -> （1）
        // （\n1\n） -> （1）
        // (\n2\n) -> （2）
        text = text.replace(/[（(]\s*\n+\s*([一二三四五六七八九十百千万0-9]+)\s*\n*\s*[）)]/g, '（$1）');
        text = text.replace(/[（(]\s*([一二三四五六七八九十百千万0-9]+)\s*\n+\s*[）)]/g, '（$1）');
        text = text.replace(/\*\*(\S)/g, '**$1');
        text = text.replace(/[ \t]{3,}/g, '  ');
        return text.trim();
    }

    function appendMessage(text, role, renderMarkdown = false, persist = true) {
        const message = document.createElement('div');
        message.className = `message-row ${role}`;

        const avatar = document.createElement('div');
        avatar.className = `avatar ${role}`;
        avatar.textContent = role === 'bot' ? 'AI' : '我';

        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';

        if (renderMarkdown) {
            bubble.innerHTML = renderMarkdownLite(text);
        } else {
            bubble.textContent = text;
        }

        if (role === 'user') {
            message.appendChild(bubble);
            message.appendChild(avatar);
        } else {
            message.appendChild(avatar);
            message.appendChild(bubble);
        }

        if (persist) {
            const historyId = addHistoryEntry(role, text, renderMarkdown);
            message.dataset.historyId = historyId;
        }

        messagesEl.appendChild(message);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return message;
    }

    function getMessageBubble(messageEl) {
        const bubble = messageEl.querySelector('.message-bubble');
        return bubble || messageEl;
    }

    function updateBotMessage(messageEl, content) {
        getMessageBubble(messageEl).innerHTML = renderMarkdownLite(content);
        updateHistoryEntryById(messageEl.dataset.historyId, content, true);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function updateBotMessagePlain(messageEl, content) {
        getMessageBubble(messageEl).textContent = content;
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function restoreHistoryToView() {
        messagesEl.innerHTML = '';

        if (!isLoggedIn()) {
            chatHistory = [];
            appendMessage('你好，我是AI助手。', 'bot', false, false);
            return;
        }

        const token = getAuthToken();
        const url = CHAT_HISTORY_API_URL + '?sessionId=' + encodeURIComponent(sessionId) + '&limit=' + CHAT_HISTORY_LIMIT;

        fetch(url, {
            method: 'GET',
            headers: {
                'Authorization': 'Bearer ' + token
            }
        }).then(resp => {
            if (!resp.ok) {
                throw new Error('HTTP ' + resp.status);
            }
            return resp.json();
        }).then(payload => {
            const messages = payload && payload.data && Array.isArray(payload.data.messages)
                ? payload.data.messages
                : [];

            messagesEl.innerHTML = '';
            chatHistory = [];

            if (messages.length === 0) {
                appendMessage('你好，我是AI助手。', 'bot', false, false);
                return;
            }

            messages.forEach(item => {
                const text = item && typeof item.content === 'string' ? item.content : '';
                const role = item && item.role === 'user' ? 'user' : 'bot';
                const renderMarkdown = role === 'bot';
                const messageEl = appendMessage(text, role, renderMarkdown, false);
                const historyId = item && item.id ? String(item.id) : createHistoryId();
                messageEl.dataset.historyId = historyId;
                chatHistory.push({
                    id: historyId,
                    role,
                    text,
                    renderMarkdown,
                    ts: Date.now()
                });
            });
            saveChatHistory();
        }).catch(() => {
            messagesEl.innerHTML = '';
            chatHistory = [];
            appendMessage('你好，我是AI助手。', 'bot', false, false);
        });
    }

    function setUploadProgress(percent, text, visible) {
        uploadProgressWrap.style.display = visible ? 'flex' : 'none';
        if (!visible) {
            return;
        }
        const safePercent = Math.max(0, Math.min(100, Math.floor(percent)));
        uploadProgressBar.style.width = `${safePercent}%`;
        uploadProgressText.textContent = text || `${safePercent}%`;
    }

    function parseSseBlock(blockText) {
        if (!blockText) {
            return null;
        }
        let eventName = 'message';
        const dataLines = [];
        for (const line of blockText.split('\n')) {
            if (line.startsWith('event:')) {
                eventName = line.slice(6).trim();
            }
            if (line.startsWith('data:')) {
                let dataPart = line.slice(5);
                if (dataPart.startsWith(' ')) {
                    dataPart = dataPart.slice(1);
                }
                dataLines.push(dataPart);
            }
        }
        if (dataLines.length === 0) {
            return null;
        }
        return {
            eventName,
            data: dataLines.join('\n')
        };
    }

    async function requestStreamAnswer(prompt, streamApiUrl) {
        return new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            const botMessageEl = appendMessage('正在建立连接...', 'bot', false);

            let processedLength = 0;
            let raw = '';
            let fullAnswer = '';
            let eventCount = 0;
            let doneSeen = false;
            const startedAt = Date.now();
            let firstChunkAt = null;

            let displayedText = '';
            let pendingText = '';
            const flushTimer = window.setInterval(() => {
                if (!pendingText) {
                    return;
                }
                const step = Math.min(4, pendingText.length);
                displayedText += pendingText.slice(0, step);
                pendingText = pendingText.slice(step);
                updateBotMessagePlain(botMessageEl, displayedText);
            }, 16);

            const clearFlushTimer = () => {
                window.clearInterval(flushTimer);
            };

            const finalize = (finalText, doneEventCount) => {
                clearFlushTimer();
                const finalAnswer = finalText || fullAnswer;
                updateBotMessage(botMessageEl, finalAnswer);
                const firstMs = firstChunkAt ? (firstChunkAt - startedAt) : (Date.now() - startedAt);
                const totalMs = Date.now() - startedAt;
                setStatus(`连接成功。首字 ${firstMs}ms，总耗时 ${totalMs}ms，eventCount: ${doneEventCount ?? eventCount}，sessionId: ${sessionId}`);
                resolve();
            };

            const processIncoming = (newText) => {
                if (!newText) {
                    return;
                }
                raw += newText;
                let splitIndex = raw.indexOf('\n\n');
                while (splitIndex !== -1) {
                    const block = raw.slice(0, splitIndex).trim();
                    raw = raw.slice(splitIndex + 2);

                    const parsed = parseSseBlock(block);
                    if (parsed) {
                        if (parsed.eventName === 'ready') {
                            setStatus('连接已建立，等待模型首字...');
                        } else if (parsed.eventName === 'chunk') {
                            if (firstChunkAt === null) {
                                firstChunkAt = Date.now();
                            }
                            fullAnswer += parsed.data;
                            pendingText += parsed.data;
                            eventCount += 1;
                        } else if (parsed.eventName === 'done') {
                            doneSeen = true;
                            try {
                                const donePayload = JSON.parse(parsed.data);
                                if (donePayload.sessionId) {
                                    sessionId = donePayload.sessionId;
                                    localStorage.setItem('coze-test-session-id', sessionId);
                                }
                                finalize(donePayload.answer || fullAnswer, donePayload.eventCount);
                            } catch (_) {
                                finalize(fullAnswer, eventCount);
                            }
                        } else if (parsed.eventName === 'error') {
                            clearFlushTimer();
                            reject(new Error(parsed.data || '流式通道返回错误'));
                        }
                    }
                    splitIndex = raw.indexOf('\n\n');
                }
            };

            xhr.open('POST', streamApiUrl, true);
            xhr.setRequestHeader('Content-Type', 'application/json; charset=utf-8');
            applyAuthHeader(xhr);

            xhr.onprogress = () => {
                const chunk = xhr.responseText.slice(processedLength);
                processedLength = xhr.responseText.length;
                processIncoming(chunk);
            };

            xhr.onload = () => {
                const chunk = xhr.responseText.slice(processedLength);
                processedLength = xhr.responseText.length;
                processIncoming(chunk);

                if (xhr.status < 200 || xhr.status >= 300) {
                    clearFlushTimer();
                    reject(new Error(`流式请求失败，HTTP ${xhr.status}`));
                    return;
                }

                if (!doneSeen) {
                    finalize(fullAnswer, eventCount);
                }
            };

            xhr.onerror = () => {
                clearFlushTimer();
                reject(new Error('流式连接失败，请检查后端服务或网络'));
            };

            xhr.send(JSON.stringify({ prompt, sessionId }));
        });
    }

    async function requestFileStreamAnswer(prompt, selectedFile) {
        return new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            const botMessageEl = appendMessage('文件已上传，正在生成回复...', 'bot', false);

            let processedLength = 0;
            let raw = '';
            let fullAnswer = '';
            let eventCount = 0;
            let doneSeen = false;
            const startedAt = Date.now();
            let firstChunkAt = null;

            let displayedText = '';
            let pendingText = '';
            const flushTimer = window.setInterval(() => {
                if (!pendingText) {
                    return;
                }
                const step = Math.min(4, pendingText.length);
                displayedText += pendingText.slice(0, step);
                pendingText = pendingText.slice(step);
                updateBotMessagePlain(botMessageEl, displayedText);
            }, 16);

            const clearFlushTimer = () => {
                window.clearInterval(flushTimer);
            };

            const finalize = (finalText, doneEventCount) => {
                clearFlushTimer();
                const finalAnswer = finalText || fullAnswer;
                updateBotMessage(botMessageEl, finalAnswer);
                const firstMs = firstChunkAt ? (firstChunkAt - startedAt) : (Date.now() - startedAt);
                const totalMs = Date.now() - startedAt;
                setStatus(`连接成功。首字 ${firstMs}ms，总耗时 ${totalMs}ms，eventCount: ${doneEventCount ?? eventCount}，sessionId: ${sessionId}`);
                resolve();
            };

            const processIncoming = (newText) => {
                if (!newText) {
                    return;
                }
                raw += newText;
                let splitIndex = raw.indexOf('\n\n');
                while (splitIndex !== -1) {
                    const block = raw.slice(0, splitIndex).trim();
                    raw = raw.slice(splitIndex + 2);
                    const parsed = parseSseBlock(block);
                    if (parsed) {
                        if (parsed.eventName === 'ready') {
                            setStatus('上传完成，流式连接已建立...');
                        } else if (parsed.eventName === 'phase') {
                            if (parsed.data === 'extracting') {
                                setStatus('正在提取文件文本...');
                            } else if (parsed.data === 'calling-coze') {
                                setStatus('文本提取完成，正在请求 Coze...');
                            }
                        } else if (parsed.eventName === 'chunk') {
                            if (firstChunkAt === null) {
                                firstChunkAt = Date.now();
                            }
                            fullAnswer += parsed.data;
                            pendingText += parsed.data;
                            eventCount += 1;
                        } else if (parsed.eventName === 'done') {
                            doneSeen = true;
                            try {
                                const donePayload = JSON.parse(parsed.data);
                                if (donePayload.sessionId) {
                                    sessionId = donePayload.sessionId;
                                    localStorage.setItem('coze-test-session-id', sessionId);
                                }
                                finalize(donePayload.answer || fullAnswer, donePayload.eventCount);
                            } catch (_) {
                                finalize(fullAnswer, eventCount);
                            }
                        } else if (parsed.eventName === 'error') {
                            clearFlushTimer();
                            reject(new Error(parsed.data || '文件流式通道返回错误'));
                        }
                    }
                    splitIndex = raw.indexOf('\n\n');
                }
            };

            xhr.open('POST', FILE_STREAM_API_URL, true);
            applyAuthHeader(xhr);

            xhr.upload.onprogress = (event) => {
                if (!event.lengthComputable) {
                    setUploadProgress(50, '上传中...', true);
                    return;
                }
                const percent = (event.loaded / event.total) * 100;
                setUploadProgress(percent, `上传中 ${Math.floor(percent)}%`, true);
            };

            xhr.onprogress = () => {
                const chunk = xhr.responseText.slice(processedLength);
                processedLength = xhr.responseText.length;
                processIncoming(chunk);
            };

            xhr.onload = () => {
                const chunk = xhr.responseText.slice(processedLength);
                processedLength = xhr.responseText.length;
                processIncoming(chunk);

                if (xhr.status < 200 || xhr.status >= 300) {
                    clearFlushTimer();
                    reject(new Error(`请求失败，HTTP ${xhr.status}`));
                    return;
                }

                if (!doneSeen) {
                    finalize(fullAnswer, eventCount);
                }
                setUploadProgress(100, '上传完成 100%', true);
                window.setTimeout(() => setUploadProgress(0, '', false), 500);
            };

            xhr.onerror = () => {
                clearFlushTimer();
                reject(new Error('上传或流式连接失败，请检查网络'));
            };

            const formData = new FormData();
            if (prompt) {
                formData.append('prompt', prompt);
            }
            formData.append('sessionId', sessionId);
            formData.append('file', selectedFile);
            xhr.send(formData);
        });
    }

    async function uploadWithProgress(formData) {
        return new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', FILE_API_URL, true);

            setUploadProgress(0, '上传中 0%', true);

            xhr.upload.onprogress = (event) => {
                if (!event.lengthComputable) {
                    setUploadProgress(50, '上传中...', true);
                    return;
                }
                const percent = (event.loaded / event.total) * 100;
                setUploadProgress(percent, `上传中 ${Math.floor(percent)}%`, true);
            };

            xhr.onload = () => {
                if (xhr.status < 200 || xhr.status >= 300) {
                    reject(new Error(`请求失败，HTTP ${xhr.status}`));
                    return;
                }
                try {
                    const parsed = JSON.parse(xhr.responseText);
                    setUploadProgress(100, '上传完成 100%', true);
                    window.setTimeout(() => setUploadProgress(0, '', false), 500);
                    resolve(parsed);
                } catch (_) {
                    reject(new Error('服务返回格式异常'));
                }
            };

            xhr.onerror = () => {
                reject(new Error('上传失败，请检查网络连接'));
            };

            xhr.send(formData);
        });
    }

    fileInput.addEventListener('change', () => {
        if (fileInput.files && fileInput.files.length > 0) {
            fileName.textContent = `已选文件：${fileInput.files[0].name}`;
            return;
        }
        fileName.textContent = '未选择文件（可选）';
    });

    async function sendMessage() {
        if (!requireLogin('AI智能助手')) {
            return;
        }

        const prompt = promptInput.value.trim();
        const apiUrl = apiUrlInput.value.trim();
        const selectedFile = fileInput.files && fileInput.files[0] ? fileInput.files[0] : null;

        if (!prompt && !selectedFile) {
            setStatus('请输入内容或选择文件后再发送。', true);
            return;
        }
        if (!apiUrl) {
            setStatus('请填写接口地址。', true);
            return;
        }

        const userText = selectedFile ? `${prompt || '（仅文件）'}\n[文件] ${selectedFile.name}` : prompt;
        appendMessage(userText, 'user');
        promptInput.value = '';
        sendBtn.disabled = true;
        setStatus(selectedFile ? '文件分析中，请稍候...' : '流式生成中，请稍候...');

        try {
            if (selectedFile) {
                await requestFileStreamAnswer(prompt, selectedFile);
                fileInput.value = '';
                fileName.textContent = '未选择文件（可选）';
            } else {
                setUploadProgress(0, '', false);
                await requestStreamAnswer(prompt, apiUrl);
            }
        } catch (error) {
            setUploadProgress(0, '', false);
            appendMessage(`请求失败：${error.message}`, 'bot', false);
            setStatus(`连接失败：${error.message}`, true);
        } finally {
            sendBtn.disabled = false;
            promptInput.focus();
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    promptInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    });

    document.getElementById('topAvatarWrap').addEventListener('click', () => {
        window.location.href = 'profile.html';
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('token');
        localStorage.removeItem('username');
        sessionStorage.removeItem('token');
        sessionStorage.removeItem('username');
        location.reload();
    });

    document.querySelectorAll('[data-auth-required="true"]').forEach((el) => {
        el.addEventListener('click', (event) => {
            event.preventDefault();
            const target = el.getAttribute('href') || 'ai-chat-test.html';
            if (requireLogin(el.textContent.trim() || '该功能')) {
                window.location.href = target;
            }
        });
    });

    renderTopRightUser();
    restoreHistoryToView();
</script>
