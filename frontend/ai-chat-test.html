<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
<link rel="icon" type="image/png" href="assets/images/scenarios/AI头像-圆形.png">
<title>职途安</title>
    <style>
        :root {
            --bg-1: #F0F9FF;
            --bg-2: #E6F7FF;
            --panel: rgba(255, 255, 255, 0.18);
            --line: rgba(255, 255, 255, 0.35);
            --text: #334155;
            --muted: #64748B;
            --brand: #1D4ED8;
            --brand-hover: #1E40AF;
            --user-bubble: #DBEAFE;
            --bot-bubble: #F8FAFC;
            --danger: #d93025;
        }

        * {
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 100%);
            color: var(--text);
            min-height: 100vh;
            height: 100vh;
            padding: 92px 12px 12px;
            overflow: hidden;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 40px;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #dbeafe;
            box-shadow: 0 6px 18px rgba(30, 64, 175, 0.08);
            z-index: 1000;
        }

        .logo {
            font-weight: bold;
            font-size: 20px;
            color: #111827;
            min-width: 110px;
        }

        .nav-center {
            display: flex;
            flex: 1;
            justify-content: center;
            gap: 30px;
        }

        .nav-center a {
            text-decoration: none;
            color: #334155;
            font-size: 14px;
            position: relative;
        }

        .nav-center a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: #1677ff;
            transition: 0.3s;
        }

        .nav-center a:hover::after {
            width: 100%;
        }

        .nav-center a.active {
            color: #1d4ed8;
            font-weight: 600;
        }

        .nav-center a.active::after {
            width: 100%;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: flex-end;
            min-width: 220px;
            flex: 0 0 220px;
        }

        .nav-btn {
            padding: 6px 14px;
            border-radius: 20px;
            background: #eef2ff;
            text-decoration: none;
            color: #1e3a8a;
            font-size: 13px;
            border: 1px solid #c7d2fe;
            cursor: pointer;
        }

        .nav-btn.primary {
            background: #1d4ed8;
            color: #fff;
            border-color: #1d4ed8;
        }

        #guest-nav,
        #user-nav {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #user-nav {
            display: none;
        }

        .avatar-wrapper {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            overflow: hidden;
            background: #1d4ed8;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            cursor: pointer;
        }

        .avatar-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .chat-shell {
            width: 100%;
            margin: 0 auto;
            height: calc(100vh - 104px);
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 22px;
            backdrop-filter: blur(12px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .chat-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: 100%;
            min-height: 0;
        }

        .chat-sidebar {
            background: rgba(255, 255, 255, 0.3);
            border-right: 1px solid var(--line);
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 14px 12px;
            border-bottom: 1px solid var(--line);
        }

        .new-chat-btn {
            width: 100%;
            height: 40px;
            border-radius: 10px;
            background: #2563eb;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .new-chat-btn:hover {
            background: #1d4ed8;
        }

        .sidebar-note {
            margin-top: 8px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.4;
        }

        .session-list {
            padding: 10px;
            overflow-y: auto;
            scrollbar-width: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
            flex: 1;
        }

        .session-list::-webkit-scrollbar {
            width: 0;
            height: 0;
        }

        .session-list.is-scrolling {
            scrollbar-width: thin;
            scrollbar-color: rgba(29, 78, 216, 0.45) transparent;
        }

        .session-list.is-scrolling::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .session-list.is-scrolling::-webkit-scrollbar-thumb {
            background: rgba(29, 78, 216, 0.45);
            border-radius: 999px;
        }

        .session-list.is-scrolling::-webkit-scrollbar-track {
            background: transparent;
        }

        .session-item {
            display: flex;
            gap: 8px;
            align-items: center;
            background: rgba(255, 255, 255, 0.62);
            border: 1px solid transparent;
            border-radius: 10px;
            padding: 8px;
        }

        .session-item.active {
            border-color: #93c5fd;
            box-shadow: inset 0 0 0 1px #bfdbfe;
            background: #eff6ff;
        }

        .session-main {
            border: none;
            background: transparent;
            text-align: left;
            color: #1e293b;
            padding: 0;
            width: auto;
            flex: 1;
            cursor: pointer;
            min-width: 0;
        }

        .session-main:hover {
            background: transparent;
        }

        .session-title {
            font-size: 13px;
            font-weight: 600;
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-time {
            margin-top: 2px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.2;
        }

        .session-delete {
            width: 26px;
            height: 26px;
            border-radius: 8px;
            border: 1px solid #dbeafe;
            background: #fff;
            color: #64748b;
            font-size: 14px;
            cursor: pointer;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .session-delete:hover {
            background: #fee2e2;
            color: #b91c1c;
            border-color: #fecaca;
        }

        .session-empty {
            text-align: center;
            color: var(--muted);
            font-size: 13px;
            padding: 28px 8px;
        }

        .chat-main {
            display: flex;
            flex-direction: column;
            min-height: 0;
            min-width: 0;
            overflow: hidden;
        }

        .topbar {
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.2);
            border-bottom: 1px solid var(--line);
            flex-wrap: wrap;
            gap: 8px;
        }

        .brand {
            font-size: 24px;
            font-weight: 700;
            color: var(--brand);
        }

        .quick-nav {
            display: flex;
            gap: 16px;
        }

        .quick-nav a {
            text-decoration: none;
            color: #1E3A8A;
            font-weight: 500;
        }

        .quick-nav a:hover {
            color: var(--brand);
        }

        .chat-titlebar {
            padding: 14px 20px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.14);
        }

        .title {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            color: #1E3A8A;
        }

        .hint {
            margin-top: 4px;
            font-size: 13px;
            color: var(--muted);
        }

        .status {
            margin-top: 6px;
            font-size: 12px;
            color: var(--muted);
            display: none;
        }

        .status.error {
            color: var(--danger);
        }

        .messages {
            height: auto;
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            scrollbar-width: none;
            padding: 18px 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.42) 0%, rgba(255, 255, 255, 0.22) 100%);
        }

        .messages::-webkit-scrollbar {
            width: 0;
            height: 0;
        }

        .messages.is-scrolling {
            scrollbar-width: thin;
            scrollbar-color: rgba(29, 78, 216, 0.45) transparent;
        }

        .messages.is-scrolling::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .messages.is-scrolling::-webkit-scrollbar-thumb {
            background: rgba(29, 78, 216, 0.45);
            border-radius: 999px;
        }

        .messages.is-scrolling::-webkit-scrollbar-track {
            background: transparent;
        }

        .message-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            width: 100%;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .avatar.bot {
            background: linear-gradient(135deg, #1D4ED8 0%, #2563EB 100%);
        }

        .avatar.user {
            background: linear-gradient(135deg, #0EA5E9 0%, #1D4ED8 100%);
        }

        .message-bubble {
            width: fit-content;
            max-width: min(40em, calc(100% - 84px));
            min-width: 0;
            padding: 10px 12px;
            border-radius: 14px;
            line-height: 1.6;
            font-size: 16px;
            white-space: pre-wrap;
            word-break: break-word;
            border: 1px solid transparent;
        }

        .message-bubble p {
            margin: 0 0 8px 0;
            font-size: 16px;
            font-weight: 400;
            line-height: 1.6;
        }

        .message-bubble p:last-child {
            margin-bottom: 0;
        }

        .message-bubble h1,
        .message-bubble h2,
        .message-bubble h3,
        .message-bubble h4,
        .message-bubble h5,
        .message-bubble h6,
        .message-bubble strong {
            margin: 0 0 8px 0;
            font-size: 16px;
            line-height: 1.6;
            font-weight: 600;
        }

        .message-bubble li {
            font-size: 16px;
            line-height: 1.6;
        }

        .message-bubble pre {
            margin: 8px 0;
            padding: 8px;
            background: rgba(0, 0, 0, 0.06);
            border-radius: 8px;
            overflow-x: auto;
            font-size: 13px;
        }

        .message-bubble code {
            font-family: Consolas, monospace;
        }

        .message-bubble ul {
            margin: 6px 0 6px 20px;
            padding: 0;
        }

        .message-bubble a {
            color: #0f5dcc;
            text-decoration: underline;
        }

        .message-row.user .message-bubble {
            background: var(--user-bubble);
            border-color: #c6dcff;
        }

        .message-row.bot .message-bubble {
            background: var(--bot-bubble);
            border-color: #e3e6ea;
        }

        .composer {
            border-top: 1px solid var(--line);
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(255, 255, 255, 0.45);
            flex-shrink: 0;
        }

        .composer-top {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .composer-main {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: stretch;
        }

        .file-input {
            max-width: 100%;
            font-size: 14px;
        }

        .file-name {
            font-size: 13px;
            color: var(--muted);
        }

        .upload-progress-wrap {
            width: min(560px, 100%);
            display: none;
            align-items: center;
            gap: 8px;
        }

        .upload-progress-track {
            flex: 1;
            height: 8px;
            background: #e9eef7;
            border-radius: 99px;
            overflow: hidden;
        }

        .upload-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #1677ff, #59a2ff);
            transition: width 0.15s linear;
        }

        .upload-progress-text {
            font-size: 12px;
            color: var(--muted);
            min-width: 88px;
            text-align: right;
        }

        textarea {
            resize: none;
            height: 110px;
            border-radius: 10px;
            border: 1px solid #BFDBFE;
            padding: 12px;
            font-size: 16px;
            line-height: 1.5;
            background: rgba(255, 255, 255, 0.92);
        }

        button {
            border: none;
            border-radius: 10px;
            background: var(--brand);
            color: #fff;
            width: 110px;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            background: var(--brand-hover);
        }

        button:disabled {
            background: #9aa7bd;
            cursor: not-allowed;
        }

        @media (max-width: 680px) {
            body {
                padding: 84px 8px 8px;
            }

            .header {
                padding: 12px 16px;
            }

            .nav-center {
                gap: 14px;
            }

            .topbar {
                padding: 14px 16px;
            }

            .chat-layout {
                grid-template-columns: 1fr;
            }

            .chat-shell {
                height: calc(100vh - 92px);
            }

            .chat-sidebar {
                border-right: none;
                border-bottom: 1px solid var(--line);
            }

            .session-list {
                max-height: 200px;
            }

            .brand {
                font-size: 20px;
            }

            .messages {
                min-height: 240px;
            }

            .composer-main {
                grid-template-columns: 1fr;
            }

            button {
                width: 100%;
                height: 42px;
            }
        }
    </style>
</head>
<body>
<header class="header">
    <div class="logo">职途安</div>
    <nav class="nav-center">
        <a href="home.html">首页</a>
        <a href="ai-chat-test.html" data-auth-required="true" class="active">AI助手</a>
        <a href="case.html">案例模拟</a>
        <a href="forum.html">交流论坛</a>
    </nav>
    <div class="nav-right">
        <div id="guest-nav">
            <a href="login.html?redirect=ai-chat-test.html" class="nav-btn">登录</a>
            <a href="register.html?redirect=ai-chat-test.html" class="nav-btn primary">注册</a>
        </div>
        <div id="user-nav">
            <div class="avatar-wrapper" id="topAvatarWrap">
                <img id="topAvatarImage" alt="头像" style="display:none;">
                <span id="topAvatarLetter">游</span>
            </div>
            <span id="topUserName" style="font-size:13px;color:#1e3a8a;">用户</span>
        </div>
    </div>
</header>

<div class="chat-shell">
    <input id="apiUrl" type="hidden" value="http://localhost:8090/api/ai/coze/query-stream" />
    <div class="chat-layout">
        <aside class="chat-sidebar">
            <div class="sidebar-header">
                <button id="newChatBtn" class="new-chat-btn" type="button">+ 新对话</button>
            </div>
            <div id="sessionList" class="session-list"></div>
        </aside>

        <section class="chat-main">
            <div id="messages" class="messages">
                <div class="message-row bot">
                    <div class="avatar bot"><img src="assets/images/scenarios/AI头像.png" alt="AI头像"></div>
                    <div class="message-bubble">你好，我是AI助手。</div>
                </div>
            </div>

            <div class="composer">
                <div class="composer-top">
                    <input id="fileInput" class="file-input" type="file" accept=".txt,.md,.doc,.docx,.pdf" />
                    <span id="fileName" class="file-name">未选择文件（可选）</span>
                </div>
                <div id="uploadProgressWrap" class="upload-progress-wrap">
                    <div class="upload-progress-track">
                        <div id="uploadProgressBar" class="upload-progress-bar"></div>
                    </div>
                    <span id="uploadProgressText" class="upload-progress-text">0%</span>
                </div>
                <div class="composer-main">
                    <textarea id="promptInput" placeholder="请输入测试内容，例如：请帮我判断一份劳动合同中可能的风险条款"></textarea>
                    <button id="sendBtn" type="button">发送</button>
                </div>
                <div id="status" class="status" aria-hidden="true"></div>
            </div>
        </section>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    if (window.marked && typeof window.marked.setOptions === 'function') {
        window.marked.setOptions({
            gfm: true,
            breaks: true
        });
    }

    const statusEl = document.getElementById('status');
    const messagesEl = document.getElementById('messages');
    const promptInput = document.getElementById('promptInput');
    const sendBtn = document.getElementById('sendBtn');
    const apiUrlInput = document.getElementById('apiUrl');
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const uploadProgressWrap = document.getElementById('uploadProgressWrap');
    const uploadProgressBar = document.getElementById('uploadProgressBar');
    const uploadProgressText = document.getElementById('uploadProgressText');
    const newChatBtn = document.getElementById('newChatBtn');
    const sessionListEl = document.getElementById('sessionList');

    const API_BASE = 'http://localhost:8090';
    const FILE_API_URL = API_BASE + '/api/ai/coze/query-with-file';
    const FILE_STREAM_API_URL = API_BASE + '/api/ai/coze/query-with-file-stream';
    const CHAT_HISTORY_API_URL = API_BASE + '/api/ai/coze/history';

    function getToken() {
        return localStorage.getItem('token') || sessionStorage.getItem('token') || '';
    }

    function getUsername() {
        return localStorage.getItem('username') || sessionStorage.getItem('username') || '用户';
    }

    function getCurrentUserId() {
        return localStorage.getItem('userId') || sessionStorage.getItem('userId') || '';
    }

    function getOnlineTimerStart() {
        const raw = sessionStorage.getItem('onlineTimerStartAt') || '';
        const value = Number(raw);
        if (Number.isFinite(value) && value > 0) {
            return value;
        }
        const now = Date.now();
        sessionStorage.setItem('onlineTimerStartAt', String(now));
        return now;
    }

    function flushOnlineSeconds() {
        const now = Date.now();
        const start = getOnlineTimerStart();
        const seconds = Math.max(0, Math.floor((now - start) / 1000));
        sessionStorage.setItem('onlineTimerStartAt', String(now));
        return seconds;
    }

    async function reportUserActivity(payload) {
        const token = getToken();
        const userId = getCurrentUserId();
        if (!token || !userId || !payload) {
            return;
        }
        try {
            await fetch(API_BASE + '/api/users/' + encodeURIComponent(userId) + '/activity', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify(payload)
            });
        } catch (err) {
            // ignore network errors
        }
    }

    function getAvatarDataUrl() {
        return localStorage.getItem('userAvatar') || sessionStorage.getItem('userAvatar') || '';
    }

    async function syncCurrentUserAvatarFromBackend() {
        const token = getToken();
        const userId = getCurrentUserId();
        if (!token || !userId) {
            return;
        }
        try {
            const response = await fetch(API_BASE + '/api/users/' + encodeURIComponent(userId) + '/profile', {
                headers: { Authorization: 'Bearer ' + token }
            });
            if (!response.ok) {
                return;
            }
            const payload = await response.json();
            if (!(payload && payload.code === 200 && payload.data)) {
                return;
            }
            const avatarDataUrl = payload.data.avatarDataUrl || '';
            if (avatarDataUrl) {
                localStorage.setItem('userAvatar', avatarDataUrl);
                sessionStorage.setItem('userAvatar', avatarDataUrl);
            } else {
                localStorage.removeItem('userAvatar');
                sessionStorage.removeItem('userAvatar');
            }
        } catch (err) {
            // ignore network errors and keep current local avatar fallback
        }
    }

    function isLoggedIn() {
        return Boolean(getToken());
    }

    function getAiAvatarPath() {
        return 'assets/images/scenarios/AI头像.png';
    }

    function createAvatarNode(role) {
        const avatar = document.createElement('div');
        avatar.className = `avatar ${role}`;

        const img = document.createElement('img');
        if (role === 'bot') {
            img.src = getAiAvatarPath();
            img.alt = 'AI头像';
            avatar.appendChild(img);
            return avatar;
        }

        const avatarUrl = getAvatarDataUrl();
        if (avatarUrl) {
            img.src = avatarUrl;
            img.alt = '用户头像';
            avatar.appendChild(img);
            return avatar;
        }

        avatar.textContent = (getUsername() || '我').charAt(0).toUpperCase();
        return avatar;
    }

    function requireLogin(actionName) {
        if (isLoggedIn()) {
            return true;
        }
        const goLogin = window.confirm(actionName + '需要登录后使用，是否前往登录页？');
        if (goLogin) {
            const redirect = encodeURIComponent('ai-chat-test.html');
            const action = encodeURIComponent(actionName);
            window.location.href = 'login.html?redirect=' + redirect + '&action=' + action;
        }
        return false;
    }

    const SESSION_LIST_KEY = 'coze-chat-session-list-v1';
    const ACTIVE_SESSION_ID_KEY = 'coze-chat-active-session-id-v1';
    const LOGIN_MARKER_KEY = 'coze-chat-login-marker-v1';
    const SESSION_LIST_LIMIT = 30;
    const CHAT_HISTORY_LIMIT = 30;
    let chatHistory = [];
    let activeSessionId = '';
    let sessionList = [];

    function getAuthToken() {
        return getToken();
    }

    function renderTopRightUser() {
        const guestNav = document.getElementById('guest-nav');
        const userNav = document.getElementById('user-nav');
        const nameEl = document.getElementById('topUserName');
        const avatarImg = document.getElementById('topAvatarImage');

        }
    }

    function createHistoryId() {
        if (window.crypto && typeof window.crypto.randomUUID === 'function') {
            return window.crypto.randomUUID();
        }
        return 'h-' + Date.now() + '-' + Math.floor(Math.random() * 1000000);
    }

    function createSessionId() {
        if (window.crypto && typeof window.crypto.randomUUID === 'function') {
            return window.crypto.randomUUID();
        }
        return 's-' + Date.now() + '-' + Math.floor(Math.random() * 1000000);
    }

    function formatSessionTime(ts) {
        const date = new Date(ts);
        if (Number.isNaN(date.getTime())) {
            return '';
        }
        const now = new Date();
        const sameDay = now.toDateString() === date.toDateString();
        const hh = String(date.getHours()).padStart(2, '0');
        const mm = String(date.getMinutes()).padStart(2, '0');
        if (sameDay) {
            return `今天 ${hh}:${mm}`;
        }
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${month}-${day} ${hh}:${mm}`;
    }

    function safeSessionTitle(title) {
        const clean = (title || '').replace(/\s+/g, ' ').trim();
        if (!clean) {
            return '新对话';
        }
        return clean.length > 22 ? clean.slice(0, 22) + '...' : clean;
    }

    function loadSessionList() {
        try {
            const raw = localStorage.getItem(SESSION_LIST_KEY);
            if (!raw) {
                return [];
            }
            const parsed = JSON.parse(raw);
            if (!Array.isArray(parsed)) {
                return [];
            }
            return parsed
                .filter(item => item && typeof item.id === 'string')
                .map(item => ({
                    id: item.id,
                    title: safeSessionTitle(item.title),
                    updatedAt: Number(item.updatedAt) || Date.now()
                }))
                .sort((a, b) => b.updatedAt - a.updatedAt)
                .slice(0, SESSION_LIST_LIMIT);
        } catch (_) {
            return [];
        }
    }

    function getCurrentLoginMarker() {
        const userId = getCurrentUserId();
        const token = getToken();
        if (!userId || !token) {
            return '';
        }
        return `${userId}:${token.slice(0, 24)}`;
    }

    function saveActiveSessionId() {
        if (activeSessionId) {
            localStorage.setItem(ACTIVE_SESSION_ID_KEY, activeSessionId);
            return;
        }
        localStorage.removeItem(ACTIVE_SESSION_ID_KEY);
    }

    function isSessionInList(sessionId) {
        if (!sessionId) {
            return false;
        }
        return sessionList.some(item => item.id === sessionId);
    }

    function saveSessionList() {
        sessionList = sessionList
            .sort((a, b) => b.updatedAt - a.updatedAt)
            .slice(0, SESSION_LIST_LIMIT);
        localStorage.setItem(SESSION_LIST_KEY, JSON.stringify(sessionList));

    function renderSessionList() {
        sessionListEl.innerHTML = '';

            const empty = document.createElement('div');
            empty.className = 'session-empty';
            empty.textContent = '暂无对话，点击上方“新对话”开始。';
            sessionListEl.appendChild(empty);

        sessionList.forEach(item => {
            const row = document.createElement('div');

            const mainBtn = document.createElement('button');

            const deleteBtn = document.createElement('button');

            deleteBtn.className = 'session-delete';

    function ensureSessionExists(sessionId) {
        const existing = sessionList.find(item => item.id === sessionId);
        if (existing) {
            return existing;
        }
        const newItem = {
            id: sessionId,
            title: '新对话',
            updatedAt: Date.now()
        };
        sessionList.unshift(newItem);
        saveSessionList();
        return newItem;
    }

    function touchSession(sessionId, title) {
        const item = ensureSessionExists(sessionId);
        item.updatedAt = Date.now();
        if (title) {
            item.title = safeSessionTitle(title);
        }
        saveSessionList();
        renderSessionList();
    }

    function removeSession(sessionId) {
        sessionList = sessionList.filter(item => item.id !== sessionId);
        saveSessionList();
    }

    function createNewSessionAndActivate() {
        activeSessionId = createSessionId();
        ensureSessionExists(activeSessionId);
        saveActiveSessionId();
        saveSessionList();
        renderSessionList();
        restoreHistoryToView();
    }

    function replaceActiveSessionId(newSessionId) {
        if (!newSessionId || newSessionId === activeSessionId) {
            return;
        }
        const duplicate = sessionList.find(item => item.id === newSessionId);
        if (duplicate) {
            removeSession(activeSessionId);
            activeSessionId = newSessionId;
            saveActiveSessionId();
            touchSession(activeSessionId);
            return;
        }

        const activeItem = sessionList.find(item => item.id === activeSessionId);
        if (activeItem) {
            activeItem.id = newSessionId;
            activeItem.updatedAt = Date.now();
        } else {
            sessionList.unshift({
                id: newSessionId,
                title: '新对话',
                updatedAt: Date.now()
            });
        }
        activeSessionId = newSessionId;
        saveActiveSessionId();
        saveSessionList();
        renderSessionList();
    }

    function switchSession(sessionId) {
        if (!sessionId) {
            return;
        }
        activeSessionId = sessionId;
        saveActiveSessionId();
        touchSession(activeSessionId);
        restoreHistoryToView();
    }

    function escapeHtml(text) {
        return text
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function renderMarkdownLite(markdownText) {
        const normalized = applyReadableLineBreaks(normalizeCozeMarkdown(markdownText || ''));

        if (window.marked && typeof window.marked.parse === 'function') {
            const normalizedForMarked = normalized
                .replace(/\u2028/g, '\n')
                .replace(/\u2029/g, '\n');

            // 强制保留单行换行：把段内单换行转换为 Markdown 的硬换行
            const markdownWithForcedBreaks = normalizedForMarked
                .split(/\n\n+/)
                .map(part => part.replace(/\n/g, '  \n'))
                .join('\n\n');

            return window.marked.parse(markdownWithForcedBreaks);
        }

        let html = escapeHtml(normalized);

        html = html.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
        html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
        html = html.replace(/^###\s+(.+)$/gm, '<p><strong>$1</strong></p>');
        html = html.replace(/^##\s+(.+)$/gm, '<p><strong>$1</strong></p>');
        html = html.replace(/^#\s+(.+)$/gm, '<p><strong>$1</strong></p>');
        html = html.replace(/^[-*]\s+(.+)$/gm, '<li>$1</li>');
        html = html.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
        html = html.replace(/<\/ul>\s*<ul>/g, '');
        html = html.replace(/\n{2,}/g, '</p><p>');
        html = `<p>${html.replace(/\n/g, '<br>')}</p>`;
        return html.replace(/<p><\/p>/g, '');
    }

    function applyReadableLineBreaks(text) {
        if (!text) {
            return text;
        }

        // 代码块/列表/标题等结构化内容不做自动切分，避免破坏格式。
        if (/```|^\s*[-*]\s+|^\s*#{1,6}\s+/m.test(text)) {
            return text;
        }

        const normalizedSource = text
            .replace(/\u3000/g, ' ')
            .replace(/\u00A0/g, ' ')
            .replace(/\r\n/g, '\n')
            .replace(/\r/g, '\n');

        function insertBreakBeforeMarker(input, regex) {
            return input.replace(regex, (match, offset, whole) => {
                let cursor = offset - 1;
                while (cursor >= 0 && /[ \t]/.test(whole[cursor])) {
                    cursor--;
                }
                const prev = cursor >= 0 ? whole[cursor] : '';

                if (offset === 0 || prev === '\n') {
                    return match;
                }

                // 避免把已经正确合并的括号编号再次拆开：例如 （1）
                if (prev === '（' || prev === '(') {
                    return match;
                }

                // 避免把法条标题等内联括号序号拆开：例如《...解释（一）》
                if ((match.startsWith('（') || match.startsWith('(')) && /[\u4e00-\u9fa5A-Za-z0-9》]/.test(prev)) {
                    return match;
                }

                return '\n' + match;
            });
        }

        // 只做最小化结构断行，不做长度硬切。
        const markerPatterns = [
            /第\s*[一二三四五六七八九十百千万0-9]+\s*条/g,
            /[（(]\s*[一二三四五六七八九十百千万0-9]+\s*[）)](?:\s*\d+款)?/g,
            /[①②③④⑤⑥⑦⑧⑨⑩⑪⑫⑬⑭⑮⑯⑰⑱⑲⑳]/g,
            /[一二三四五六七八九十]+、/g,
            /\d+、/g,
            /\d+[）)](?=\s*[\u4e00-\u9fa5A-Za-z(（])/g,
            /\d+\.(?=\s*[\u4e00-\u9fa5A-Za-z(（])/g,
            /[A-Za-z][\.)）](?=\s*[\u4e00-\u9fa5A-Za-z(（])/g,
            /风险状态：/g,
            /问题分析：/g,
            /法律依据：/g,
            /修改建议：/g,
            /主要风险：/g,
            /维权建议：/g,
            /签约建议：/g,
            /原文内容：/g
        ];

        let output = normalizedSource
            // 仅修复极端破碎编号： （\n1） -> （1）
            .replace(/[（(]\s*\n+\s*([一二三四五六七八九十百千万0-9]+)\s*[）)]/g, '（$1）')
            .replace(/[（(]\s*([一二三四五六七八九十百千万0-9]+)\s*\n+\s*[）)]/g, '（$1）')
            // 修复法条标题中的错误断行： 《...解释\n（一）...》
            .replace(/《([^》\n]*)\n+([（(][一二三四五六七八九十百千万0-9]+[）)])([^》\n]*)》/g, '《$1$2$3》');

        for (const pattern of markerPatterns) {
            output = insertBreakBeforeMarker(output, pattern);
        }

        return output
            .replace(/\n{3,}/g, '\n\n')
            .replace(/^\n+/, '')
            .trim();
    }

    function normalizeCozeMarkdown(input) {
        if (!input) {
            return '';
        }

        let text = input.replace(/\r\n/g, '\n');
        text = text.replace(/\u2028/g, '\n').replace(/\u2029/g, '\n');
        const fenceMatch = text.trim().match(/^```(?:markdown)?([\s\S]*?)```$/i);
        if (fenceMatch) {
            text = fenceMatch[1].trim();
        }

        text = text.replace(/(#{1,6})(\S)/g, '$1 $2');
        text = text.replace(/([\u4e00-\u9fa5A-Za-z0-9，。；：？！、）\)])-\s+/g, '$1\n- ');
        text = text.replace(/\\r\\n/g, '\n');
        text = text.replace(/\\n/g, '\n');
        // 强制修复括号编号被拆行：
        // （\n1） -> （1）
        // （\n1\n） -> （1）
        // (\n2\n) -> （2）
        text = text.replace(/[（(]\s*\n+\s*([一二三四五六七八九十百千万0-9]+)\s*\n*\s*[）)]/g, '（$1）');
        text = text.replace(/[（(]\s*([一二三四五六七八九十百千万0-9]+)\s*\n+\s*[）)]/g, '（$1）');
        text = text.replace(/\*\*(\S)/g, '**$1');
        text = text.replace(/[ \t]{3,}/g, '  ');
        return text.trim();
    }

    function appendMessage(text, role, renderMarkdown = false, persist = true) {
        const message = document.createElement('div');
        message.className = `message-row ${role}`;

        const avatar = createAvatarNode(role);

        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';

        if (renderMarkdown) {
            bubble.innerHTML = renderMarkdownLite(text);
        } else {
            bubble.textContent = text;
        }

        if (role === 'user') {
            message.appendChild(bubble);
            message.appendChild(avatar);
        } else {
            message.appendChild(avatar);
            message.appendChild(bubble);
        }

        if (persist) {
            const historyId = addHistoryEntry(role, text, renderMarkdown);
            message.dataset.historyId = historyId;
        }

        messagesEl.appendChild(message);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return message;
    }

        return bubble || messageEl;

    function updateBotMessage(messageEl, content) {
        getMessageBubble(messageEl).innerHTML = renderMarkdownLite(content);
        updateHistoryEntryById(messageEl.dataset.historyId, content, true);
        messagesEl.scrollTop = messagesEl.scrollHeight;

    function updateBotMessagePlain(messageEl, content) {

    function restoreHistoryToView() {
        messagesEl.innerHTML = '';

        if (!isLoggedIn()) {
            chatHistory = [];
            appendMessage('你好，我是AI助手。', 'bot', false, false);
            return;
        }

        if (!activeSessionId) {
            appendMessage('你好，我是AI助手。', 'bot', false, false);
            return;
        }

        const token = getAuthToken();
        const url = CHAT_HISTORY_API_URL + '?sessionId=' + encodeURIComponent(activeSessionId) + '&limit=' + CHAT_HISTORY_LIMIT;

        fetch(url, {
            method: 'GET',
            headers: {
                'Authorization': 'Bearer ' + token
            }
        }).then(resp => {
            if (!resp.ok) {
                throw new Error('HTTP ' + resp.status);
            }
            return resp.json();
        }).then(payload => {
            const messages = payload && payload.data && Array.isArray(payload.data.messages)
                ? payload.data.messages
                : [];

            messagesEl.innerHTML = '';
            chatHistory = [];

            if (messages.length === 0) {
                appendMessage('你好，我是AI助手。', 'bot', false, false);
                return;
            }

            messages.forEach(item => {
                const text = item && typeof item.content === 'string' ? item.content : '';
                const role = item && item.role === 'user' ? 'user' : 'bot';
                const renderMarkdown = role === 'bot';
                const messageEl = appendMessage(text, role, renderMarkdown, false);
                const historyId = item && item.id ? String(item.id) : createHistoryId();
                messageEl.dataset.historyId = historyId;
                chatHistory.push({
                    id: historyId,
                    role,
                    text,
                    renderMarkdown,
                    ts: Date.now()
                });
            });
            saveChatHistory();
            touchSession(activeSessionId);
        }).catch(() => {
            messagesEl.innerHTML = '';
            chatHistory = [];
            appendMessage('你好，我是AI助手。', 'bot', false, false);
        });
    }

    function setUploadProgress(percent, text, visible) {
        uploadProgressWrap.style.display = visible ? 'flex' : 'none';
        if (!visible) {
            return;
        }
        const safePercent = Math.max(0, Math.min(100, Math.floor(percent)));
        uploadProgressBar.style.width = `${safePercent}%`;

    }

    function parseSseBlock(blockText) {
        if (!blockText) {
            return null;
        }
        let eventName = 'message';
        const dataLines = [];
        for (const line of blockText.split('\n')) {
            if (line.startsWith('event:')) {
                eventName = line.slice(6).trim();
            }
            if (line.startsWith('data:')) {
                let dataPart = line.slice(5);
                if (dataPart.startsWith(' ')) {
                    dataPart = dataPart.slice(1);
                }
                dataLines.push(dataPart);
            }
        }
        if (dataLines.length === 0) {
            return null;
        }
        return {
            eventName,
            data: dataLines.join('\n')
        };
    }

    async function requestStreamAnswer(prompt, streamApiUrl) {
        return new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            const botMessageEl = appendMessage('正在建立连接...', 'bot', false);

            let processedLength = 0;
            let raw = '';
            let fullAnswer = '';
            let eventCount = 0;
            let doneSeen = false;
            const startedAt = Date.now();
            let firstChunkAt = null;

            let displayedText = '';
            let pendingText = '';
            const flushTimer = window.setInterval(() => {
                if (!pendingText) {
                    return;
                }
                const step = Math.min(4, pendingText.length);
                displayedText += pendingText.slice(0, step);
                pendingText = pendingText.slice(step);
                updateBotMessagePlain(botMessageEl, displayedText);
            }, 16);

            const clearFlushTimer = () => {
                window.clearInterval(flushTimer);
            };

            const finalize = (finalText, doneEventCount) => {
                clearFlushTimer();
                const finalAnswer = finalText || fullAnswer;
                updateBotMessage(botMessageEl, finalAnswer);
                const firstMs = firstChunkAt ? (firstChunkAt - startedAt) : (Date.now() - startedAt);
                const totalMs = Date.now() - startedAt;
                setStatus(`连接成功。首字 ${firstMs}ms，总耗时 ${totalMs}ms，eventCount: ${doneEventCount ?? eventCount}，sessionId: ${activeSessionId}`);
                resolve();
            };

            const processIncoming = (newText) => {
                if (!newText) {
                    return;
                }
                raw += newText;
                let splitIndex = raw.indexOf('\n\n');
                while (splitIndex !== -1) {
                    const block = raw.slice(0, splitIndex).trim();
                    raw = raw.slice(splitIndex + 2);

                    const parsed = parseSseBlock(block);
                    if (parsed) {
                        if (parsed.eventName === 'ready') {
                            setStatus('连接已建立，等待模型首字...');
                        } else if (parsed.eventName === 'chunk') {
                            if (firstChunkAt === null) {
                                firstChunkAt = Date.now();
                            }
                            fullAnswer += parsed.data;
                            pendingText += parsed.data;
                            eventCount += 1;
                        } else if (parsed.eventName === 'done') {
                            doneSeen = true;
                            try {
                                const donePayload = JSON.parse(parsed.data);
                                if (donePayload.sessionId) {
                                    replaceActiveSessionId(donePayload.sessionId);
                                }
                                finalize(donePayload.answer || fullAnswer, donePayload.eventCount);
                            } catch (_) {
                                finalize(fullAnswer, eventCount);
                            }
                        } else if (parsed.eventName === 'error') {
                            clearFlushTimer();
                            reject(new Error(parsed.data || '流式通道返回错误'));
                        }
                    }
                    splitIndex = raw.indexOf('\n\n');
                }
            };

            xhr.open('POST', streamApiUrl, true);
            xhr.setRequestHeader('Content-Type', 'application/json; charset=utf-8');
            applyAuthHeader(xhr);

            xhr.onprogress = () => {
                const chunk = xhr.responseText.slice(processedLength);
                processedLength = xhr.responseText.length;
                processIncoming(chunk);
            };

            xhr.onload = () => {
                const chunk = xhr.responseText.slice(processedLength);
                processedLength = xhr.responseText.length;
                processIncoming(chunk);

                if (xhr.status < 200 || xhr.status >= 300) {
                    clearFlushTimer();
                    reject(new Error(`流式请求失败，HTTP ${xhr.status}`));
                    return;
                }

                if (!doneSeen) {
                    finalize(fullAnswer, eventCount);
                }
            };

            xhr.onerror = () => {
                clearFlushTimer();
                reject(new Error('流式连接失败，请检查后端服务或网络'));
            };

            xhr.send(JSON.stringify({ prompt, sessionId: activeSessionId }));
        });
    }

    async function requestFileStreamAnswer(prompt, selectedFile) {
        return new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            const botMessageEl = appendMessage('文件已上传，正在生成回复...', 'bot', false);

            let processedLength = 0;
            let raw = '';
            let fullAnswer = '';
            let eventCount = 0;
            let doneSeen = false;
            const startedAt = Date.now();
            let firstChunkAt = null;

            let displayedText = '';
            let pendingText = '';
            const flushTimer = window.setInterval(() => {
                if (!pendingText) {
                    return;
                }
                const step = Math.min(4, pendingText.length);
                displayedText += pendingText.slice(0, step);
                pendingText = pendingText.slice(step);
                updateBotMessagePlain(botMessageEl, displayedText);
            }, 16);

            const clearFlushTimer = () => {
                window.clearInterval(flushTimer);
            };

            const finalize = (finalText, doneEventCount) => {
                clearFlushTimer();
                const finalAnswer = finalText || fullAnswer;
                updateBotMessage(botMessageEl, finalAnswer);
                const firstMs = firstChunkAt ? (firstChunkAt - startedAt) : (Date.now() - startedAt);
                const totalMs = Date.now() - startedAt;
                setStatus(`连接成功。首字 ${firstMs}ms，总耗时 ${totalMs}ms，eventCount: ${doneEventCount ?? eventCount}，sessionId: ${activeSessionId}`);
                resolve();
            };

            const processIncoming = (newText) => {
                if (!newText) {
                    return;
                }
                raw += newText;
                let splitIndex = raw.indexOf('\n\n');
                while (splitIndex !== -1) {
                    const block = raw.slice(0, splitIndex).trim();
                    raw = raw.slice(splitIndex + 2);
                    const parsed = parseSseBlock(block);
                    if (parsed) {
                        if (parsed.eventName === 'ready') {
                            setStatus('上传完成，流式连接已建立...');
                        } else if (parsed.eventName === 'phase') {
                            if (parsed.data === 'extracting') {
                                setStatus('正在提取文件文本...');
                            } else if (parsed.data === 'calling-coze') {
                                setStatus('文本提取完成，正在请求 Coze...');
                            }
                        } else if (parsed.eventName === 'chunk') {
                            if (firstChunkAt === null) {
                                firstChunkAt = Date.now();
                            }
                            fullAnswer += parsed.data;
                            pendingText += parsed.data;
                            eventCount += 1;
                        } else if (parsed.eventName === 'done') {
                            doneSeen = true;
                            try {
                                const donePayload = JSON.parse(parsed.data);
                                if (donePayload.sessionId) {
                                    replaceActiveSessionId(donePayload.sessionId);
                                }
                                finalize(donePayload.answer || fullAnswer, donePayload.eventCount);
                            } catch (_) {
                                finalize(fullAnswer, eventCount);
                            }
                        } else if (parsed.eventName === 'error') {
                            clearFlushTimer();
                            reject(new Error(parsed.data || '文件流式通道返回错误'));
                        }
                    }
                    splitIndex = raw.indexOf('\n\n');
                }
            };

            xhr.open('POST', FILE_STREAM_API_URL, true);
            applyAuthHeader(xhr);

            xhr.upload.onprogress = (event) => {
                if (!event.lengthComputable) {
                    setUploadProgress(50, '上传中...', true);
                    return;
                }
                const percent = (event.loaded / event.total) * 100;
                setUploadProgress(percent, `上传中 ${Math.floor(percent)}%`, true);
            };

            xhr.onprogress = () => {
                const chunk = xhr.responseText.slice(processedLength);
                processedLength = xhr.responseText.length;
                processIncoming(chunk);
            };

            xhr.onload = () => {
                const chunk = xhr.responseText.slice(processedLength);
                processedLength = xhr.responseText.length;
                processIncoming(chunk);

                if (xhr.status < 200 || xhr.status >= 300) {
                    clearFlushTimer();
                    reject(new Error(`请求失败，HTTP ${xhr.status}`));
                    return;
                }

                if (!doneSeen) {
                    finalize(fullAnswer, eventCount);
                }
                setUploadProgress(100, '上传完成 100%', true);
                window.setTimeout(() => setUploadProgress(0, '', false), 500);
            };

            xhr.onerror = () => {
                clearFlushTimer();
                reject(new Error('上传或流式连接失败，请检查网络'));
            };

            const formData = new FormData();
            if (prompt) {
                formData.append('prompt', prompt);
            }
            formData.append('sessionId', activeSessionId);
            formData.append('file', selectedFile);
            xhr.send(formData);
        });
    }

    async function uploadWithProgress(formData) {
        return new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', FILE_API_URL, true);

            setUploadProgress(0, '上传中 0%', true);

            xhr.upload.onprogress = (event) => {
                if (!event.lengthComputable) {
                    setUploadProgress(50, '上传中...', true);
                    return;
                }
                const percent = (event.loaded / event.total) * 100;
                setUploadProgress(percent, `上传中 ${Math.floor(percent)}%`, true);
            };

            xhr.onload = () => {
                if (xhr.status < 200 || xhr.status >= 300) {
                    reject(new Error(`请求失败，HTTP ${xhr.status}`));
                    return;
                }
                try {
                    const parsed = JSON.parse(xhr.responseText);
                    setUploadProgress(100, '上传完成 100%', true);
                    window.setTimeout(() => setUploadProgress(0, '', false), 500);
                    resolve(parsed);
                } catch (_) {
                    reject(new Error('服务返回格式异常'));
                }
            };

            xhr.onerror = () => {
                reject(new Error('上传失败，请检查网络连接'));
            };

            xhr.send(formData);
        });
    }

    fileInput.addEventListener('change', () => {
        if (fileInput.files && fileInput.files.length > 0) {
            fileName.textContent = `已选文件：${fileInput.files[0].name}`;
            return;
        }
        fileName.textContent = '未选择文件（可选）';
    });

    async function sendMessage() {
        if (!requireLogin('AI智能助手')) {
            return;
        }

        const prompt = promptInput.value.trim();
        const apiUrl = apiUrlInput.value.trim();
        const selectedFile = fileInput.files && fileInput.files[0] ? fileInput.files[0] : null;

        if (!prompt && !selectedFile) {
            setStatus('请输入内容或选择文件后再发送。', true);
            return;
        }
        if (!apiUrl) {
            setStatus('请填写接口地址。', true);
            return;
        }

        const userText = selectedFile ? `${prompt || '（仅文件）'}\n[文件] ${selectedFile.name}` : prompt;
        appendMessage(userText, 'user');
        reportUserActivity({
            onlineSeconds: flushOnlineSeconds(),
            aiQueryCount: 1
        });
        const inferredTitle = selectedFile && !prompt
            ? '[文件] ' + selectedFile.name
            : (prompt || '新对话');
        touchSession(activeSessionId, inferredTitle);
        promptInput.value = '';
        sendBtn.disabled = true;
        setStatus(selectedFile ? '文件分析中，请稍候...' : '流式生成中，请稍候...');

        try {
            if (selectedFile) {
                await requestFileStreamAnswer(prompt, selectedFile);
                fileInput.value = '';
                fileName.textContent = '未选择文件（可选）';
            } else {
                setUploadProgress(0, '', false);
                await requestStreamAnswer(prompt, apiUrl);
            }
        } catch (error) {
            setUploadProgress(0, '', false);
            appendMessage(`请求失败：${error.message}`, 'bot', false);
            setStatus(`连接失败：${error.message}`, true);
        } finally {
            sendBtn.disabled = false;
            promptInput.focus();
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    promptInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    });

    newChatBtn.addEventListener('click', () => {
        createNewSessionAndActivate();
        setStatus('已创建新会话。');
        promptInput.focus();
    });

    sessionListEl.addEventListener('click', (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) {
            return;
        }
        const actionNode = target.closest('[data-action]');
        if (!(actionNode instanceof HTMLElement)) {
            return;
        }
        const action = actionNode.dataset.action;
        const sessionId = actionNode.dataset.sessionId;
        if (!action || !sessionId) {
            return;
        }

        if (action === 'open') {
            if (sessionId !== activeSessionId) {
                switchSession(sessionId);
            }
            return;
        }

        if (action === 'delete') {
            removeSession(sessionId);
            if (sessionId === activeSessionId) {
                if (sessionList.length > 0) {
                    activeSessionId = sessionList[0].id;
                    saveActiveSessionId();
                    renderSessionList();
                    restoreHistoryToView();
                } else {
                    createNewSessionAndActivate();
                }
            } else {
                renderSessionList();
            }
            setStatus('会话已删除。');
        }
    });

    document.getElementById('topAvatarWrap').addEventListener('click', () => {
        window.location.href = 'profile.html';
    });

    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') {
            reportUserActivity({ onlineSeconds: flushOnlineSeconds() });
        }
    });

    document.querySelectorAll('[data-auth-required="true"]').forEach((el) => {
        el.addEventListener('click', (event) => {
            event.preventDefault();
            const target = el.getAttribute('href') || 'ai-chat-test.html';
            if (requireLogin(el.textContent.trim() || '该功能')) {
                window.location.href = target;
            }
        });
    });

    (async () => {
        bindAutoHideScrollbar(sessionListEl);
        bindAutoHideScrollbar(messagesEl);
        await syncCurrentUserAvatarFromBackend();
        renderTopRightUser();
        sessionList = loadSessionList();
        renderSessionList();

        const currentLoginMarker = getCurrentLoginMarker();
        const previousLoginMarker = localStorage.getItem(LOGIN_MARKER_KEY) || '';
        const isNewLogin = Boolean(currentLoginMarker) && currentLoginMarker !== previousLoginMarker;

        if (currentLoginMarker) {
            localStorage.setItem(LOGIN_MARKER_KEY, currentLoginMarker);
        }

        const storedActiveSessionId = localStorage.getItem(ACTIVE_SESSION_ID_KEY) || '';

        if (!isNewLogin && isSessionInList(storedActiveSessionId)) {
            activeSessionId = storedActiveSessionId;
            saveActiveSessionId();
            renderSessionList();
            restoreHistoryToView();
            return;
        }

        createNewSessionAndActivate();
    })();
</script>
</body>
