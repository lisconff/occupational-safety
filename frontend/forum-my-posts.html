<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
<link rel="icon" type="image/png" href="assets/images/scenarios/AI头像-圆形.png">
<title>职途安</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Segoe UI", "Microsoft YaHei", sans-serif; }
    body { background: linear-gradient(150deg, #eef6ff 0%, #dbeafe 48%, #eff6ff 100%); color: #0f172a; min-height: 100vh; }
    .container { max-width: 980px; margin: 0 auto; padding: 28px 16px; }
    .card { background: rgba(255,255,255,0.9); border: 1px solid #dbeafe; border-radius: 16px; box-shadow: 0 10px 24px rgba(30,64,175,0.08); }
    .top { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid #e2e8f0; }
    .top h1 { font-size: 20px; color: #1e3a8a; }
    .btn { border: 1px solid #93c5fd; background: #fff; color: #1e40af; border-radius: 999px; padding: 7px 14px; cursor: pointer; }
    .btn-danger { border: 1px solid #fca5a5; background: #fff1f2; color: #be123c; border-radius: 999px; padding: 7px 14px; cursor: pointer; }
    .list { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
    .item { border: 1px solid #e2e8f0; border-radius: 12px; background: #fff; padding: 12px; cursor: pointer; }
    .item:hover { border-color: #93c5fd; }
    .title { font-size: 15px; color: #1e3a8a; font-weight: 700; margin-bottom: 6px; }
    .meta { font-size: 12px; color: #64748b; display: flex; gap: 10px; flex-wrap: wrap; }
    .item-actions { margin-top: 10px; display: flex; justify-content: flex-end; gap: 8px; }
    .empty { color: #64748b; text-align: center; padding: 24px 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="top">
        <h1>我的帖子（全部）</h1>
        <button class="btn" id="backBtn">返回论坛</button>
      </div>
      <div class="list" id="myPostsList"></div>
    </div>
  </div>

  <script>
    const API_BASE = "http://localhost:8090";

    function getUsername() {
      return localStorage.getItem("username") || sessionStorage.getItem("username") || "";
    }

    function getToken() {
      return localStorage.getItem("token") || sessionStorage.getItem("token") || "";
    }

    function escapeHtml(text) {
      const str = (text || "").toString();
      return str.replace(/[&<>\"]/g, (ch) => {
        if (ch === "&") return "&amp;";
        if (ch === "<") return "&lt;";
        if (ch === ">") return "&gt;";
        return "&quot;";
      });
    }

    function formatDate(value) {
      if (!value) return "刚刚";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return value;
      const pad = (n) => String(n).padStart(2, "0");
      return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()) + " " + pad(d.getHours()) + ":" + pad(d.getMinutes());
    }

    async function loadMyPosts() {
      const wrap = document.getElementById("myPostsList");
      const username = getUsername();
      if (!username || !getToken()) {
        wrap.innerHTML = '<div class="empty">请先登录后查看我的帖子</div>';
        return;
      }

      wrap.innerHTML = '<div class="empty">正在加载...</div>';
      try {
        const response = await fetch(API_BASE + "/api/forum/users/" + encodeURIComponent(username) + "/posts", {
          headers: { Authorization: "Bearer " + getToken() }
        });
        const data = await response.json();
        if (!(data && data.code === 200 && Array.isArray(data.data))) {
          wrap.innerHTML = '<div class="empty">加载失败</div>';
          return;
        }

        const posts = data.data;
        if (!posts.length) {
          wrap.innerHTML = '<div class="empty">你还没有发布帖子</div>';
          return;
        }

        wrap.innerHTML = posts.map((post) => {
          return '<div class="item" data-id="' + escapeHtml(post.postId) + '">' +
            '<div class="title">' + escapeHtml(post.title || "未命名帖子") + '</div>' +
            '<div class="meta">' +
              '<span>点赞：' + (post.likeCount || 0) + '</span>' +
              '<span>评论：' + (post.commentCount || 0) + '</span>' +
              '<span>收藏：' + (post.favoriteCount || 0) + '</span>' +
              '<span>附件：' + ((post.attachments && post.attachments.length) || 0) + '</span>' +
              '<span>' + escapeHtml(formatDate(post.createdAt)) + '</span>' +
            '</div>' +
            '<div class="item-actions">' +
              '<button class="btn-danger delete-btn" data-id="' + escapeHtml(post.postId) + '">删除</button>' +
            '</div>' +
          '</div>';
        }).join("");

        document.querySelectorAll(".item").forEach((el) => {
          el.addEventListener("click", () => {
            const postId = el.getAttribute("data-id") || "";
            if (!postId) return;
            window.location.href = "post-detail.html?id=" + encodeURIComponent(postId);
          });
        });

        document.querySelectorAll(".delete-btn").forEach((btn) => {
          btn.addEventListener("click", async (event) => {
            event.stopPropagation();
            const postId = btn.getAttribute("data-id") || "";
            if (!postId) return;
            if (!window.confirm("确定删除这篇帖子吗？删除后无法恢复。")) return;
            try {
              const response = await fetch(API_BASE + "/api/forum/posts/" + encodeURIComponent(postId) + "?userId=" + encodeURIComponent(username), {
                method: "DELETE",
                headers: { Authorization: "Bearer " + getToken() }
              });
              const result = await response.json();
              if (result && result.code === 200) {
                await loadMyPosts();
                return;
              }
              window.alert(result && result.message ? result.message : "删除失败");
            } catch (err) {
              window.alert("网络错误，删除失败");
            }
          });
        });
      } catch (err) {
        wrap.innerHTML = '<div class="empty">网络错误，加载失败</div>';
      }
    }

    document.getElementById("backBtn").addEventListener("click", () => {
      window.location.href = "forum.html";
    });

    loadMyPosts();
  </script>
</body>
</html>
