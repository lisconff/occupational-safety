<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
<link rel="icon" type="image/png" href="assets/images/scenarios/AI头像-圆形.png">
<title>职途安</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Segoe UI", "Microsoft YaHei", sans-serif; }
    body { background: linear-gradient(150deg, #eef6ff 0%, #dbeafe 48%, #eff6ff 100%); color: #0f172a; min-height: 100vh; }
    .container { max-width: 980px; margin: 0 auto; padding: 28px 16px; }
    .card { background: rgba(255,255,255,0.9); border: 1px solid #dbeafe; border-radius: 16px; box-shadow: 0 10px 24px rgba(30,64,175,0.08); }
    .top { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid #e2e8f0; }
    .top h1 { font-size: 20px; color: #1e3a8a; }
    .btn { border: 1px solid #93c5fd; background: #fff; color: #1e40af; border-radius: 999px; padding: 7px 14px; cursor: pointer; }
    .list { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
    .item { border: 1px solid #e2e8f0; border-radius: 12px; background: #fff; padding: 12px; cursor: pointer; }
    .item:hover { border-color: #93c5fd; }
    .title { font-size: 15px; color: #1e3a8a; font-weight: 700; margin-bottom: 6px; }
    .meta { font-size: 12px; color: #64748b; }
    .empty { color: #64748b; text-align: center; padding: 24px 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="top">
        <h1>浏览记录（最近30条）</h1>
        <button class="btn" id="backBtn">返回论坛</button>
      </div>
      <div class="list" id="historyList"></div>
    </div>
  </div>

  <script>
    function getUsername() {
      return localStorage.getItem("username") || sessionStorage.getItem("username") || "guest";
    }

    function formatTime(ts) {
      if (!ts) return "未知时间";
      const d = new Date(ts);
      if (Number.isNaN(d.getTime())) return "未知时间";
      const pad = (n) => String(n).padStart(2, "0");
      return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()) + " " + pad(d.getHours()) + ":" + pad(d.getMinutes());
    }

    function escapeHtml(text) {
      const str = (text || "").toString();
      return str.replace(/[&<>\"]/g, (ch) => {
        if (ch === "&") return "&amp;";
        if (ch === "<") return "&lt;";
        if (ch === ">") return "&gt;";
        return "&quot;";
      });
    }

    function renderHistory() {
      const username = getUsername() || "guest";
      const key = "forum_history_" + username;
      const list = JSON.parse(localStorage.getItem(key) || "[]").slice(0, 30);
      const wrap = document.getElementById("historyList");
      if (!list.length) {
        wrap.innerHTML = '<div class="empty">暂无浏览记录</div>';
        return;
      }
      wrap.innerHTML = list.map((item) => {
        return '<div class="item" data-id="' + escapeHtml(item.postId) + '">' +
          '<div class="title">' + escapeHtml(item.title || "未命名帖子") + '</div>' +
          '<div class="meta">浏览时间：' + escapeHtml(formatTime(item.time)) + '</div>' +
        '</div>';
      }).join("");

      document.querySelectorAll(".item").forEach((el) => {
        el.addEventListener("click", () => {
          const postId = el.getAttribute("data-id") || "";
          if (!postId) return;
          window.location.href = "post-detail.html?id=" + encodeURIComponent(postId);
        });
      });
    }

    document.getElementById("backBtn").addEventListener("click", () => {
      window.location.href = "forum.html";
    });

    renderHistory();
  </script>
</body>
</html>
