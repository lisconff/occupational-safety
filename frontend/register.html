<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
<link rel="icon" type="image/png" href="assets/images/scenarios/AI头像-圆形.png">
<title>职途安</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        }

        body {
            background: linear-gradient(145deg, #eef6ff 0%, #dbeafe 55%, #eff6ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-container {
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #dbeafe;
            border-radius: 18px;
            box-shadow: 0 12px 40px rgba(30, 64, 175, 0.12);
            padding: 34px 30px;
        }

        .register-header {
            text-align: center;
            margin-bottom: 22px;
        }

        .register-header h2 {
            font-size: 26px;
            color: #1e3a8a;
            margin-bottom: 6px;
        }

        .register-header p {
            color: #64748b;
            font-size: 14px;
        }

        .register-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-label {
            font-size: 14px;
            color: #334155;
            font-weight: 600;
        }

        .form-input {
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 14px;
            transition: all 0.2s;
            background: #fff;
        }

        .form-input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
        }

        .password-box {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: none;
            cursor: pointer;
            font-size: 16px;
        }

        .register-btn {
            margin-top: 4px;
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: 12px;
            background: linear-gradient(90deg, #1e3a8a, #2563eb);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .register-btn:hover {
            opacity: 0.92;
        }

        .register-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .register-btn.secondary {
            background: #e2e8f0;
            color: #1e3a8a;
        }

        .error-message {
            display: none;
            color: #b91c1c;
            font-size: 13px;
            margin-top: -2px;
        }

        .tip {
            color: #64748b;
            font-size: 12px;
            margin-top: -6px;
        }

        .login-link {
            text-align: center;
            font-size: 14px;
            color: #64748b;
            margin-top: 18px;
        }

        .login-link a {
            color: #1d4ed8;
            text-decoration: none;
            font-weight: 600;
        }

    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h2>创建账号</h2>
            <p>请填写信息完成注册</p>
        </div>

        <div>
            <form class="register-form" id="registerForm">
                <div class="form-group">
                    <label class="form-label" for="username">用户名</label>
                    <input type="text" id="username" class="form-input" placeholder="请输入用户名" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">密码</label>
                    <div class="password-box">
                        <input type="password" id="password" class="form-input" placeholder="至少6位" required>
                        <button type="button" class="toggle-password" id="togglePassword">👁️</button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="repassword">确认密码</label>
                    <input type="password" id="repassword" class="form-input" placeholder="再次输入密码" required>
                </div>

                <div id="registerError" class="error-message"></div>
                <button type="submit" class="register-btn" id="registerBtn">完成注册</button>
            </form>
        </div>

        <div class="login-link">
            已有账号？<a id="toLoginLink" href="login.html">去登录</a>
        </div>
    </div>

    <script>
        const API_BASE = "https://occupational-safety.onrender.com";
        const query = new URLSearchParams(window.location.search);
        const redirectUrl = query.get("redirect") || "home.html";
        const toLoginLink = document.getElementById("toLoginLink");
        toLoginLink.href = "login.html?redirect=" + encodeURIComponent(redirectUrl);

        const registerForm = document.getElementById("registerForm");
        const registerBtn = document.getElementById("registerBtn");

        const usernameInput = document.getElementById("username");
        const passwordInput = document.getElementById("password");
        const repasswordInput = document.getElementById("repassword");
        const togglePassword = document.getElementById("togglePassword");
        const registerError = document.getElementById("registerError");

        function showError(el, msg) {
            el.style.display = "block";
            el.textContent = msg;
        }

        async function wait(ms) {
            return new Promise((resolve) => setTimeout(resolve, ms));
        }

        async function wakeBackend() {
            try {
                await fetch(API_BASE + "/api/health", { cache: "no-store" });
            } catch (e) {
                // Best-effort warm-up only.
            }
        }

        async function postJsonWithRetry(url, payload) {
            const maxAttempts = 2;
            for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
                const controller = new AbortController();
                const timer = setTimeout(() => controller.abort(), 20000);
                try {
                    const response = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload),
                        signal: controller.signal
                    });
                    clearTimeout(timer);
                    return response;
                } catch (err) {
                    clearTimeout(timer);
                    if (attempt === maxAttempts) {
                        throw err;
                    }
                    await wakeBackend();
                    await wait(1200);
                }
            }
            throw new Error("unexpected register retry state");
        }

        togglePassword.addEventListener("click", () => {
            const nextType = passwordInput.type === "password" ? "text" : "password";
            passwordInput.type = nextType;
            repasswordInput.type = nextType;
            togglePassword.textContent = nextType === "password" ? "👁️" : "🙈";
        });

        registerForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            registerError.style.display = "none";

            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            const repassword = repasswordInput.value;

            if (username.length < 3 || username.length > 16) {
                showError(registerError, "用户名长度需为3-16位");
                return;
            }
            if (password.length < 6 || password.length > 16) {
                showError(registerError, "密码长度需为6-16位");
                return;
            }
            if (password !== repassword) {
                showError(registerError, "两次输入的密码不一致");
                return;
            }

            registerBtn.disabled = true;
            registerBtn.classList.add("loading");
            registerBtn.textContent = "注册中...";

            try {
                await wakeBackend();
                const response = await postJsonWithRetry(API_BASE + "/api/auth/register", { username, password });

                const data = await response.json();
                if (data && data.code === 200 && data.data && data.data.token) {
                    localStorage.removeItem("token");
                    localStorage.removeItem("username");
                    localStorage.removeItem("userId");
                    localStorage.removeItem("userAvatarOwner");
                    sessionStorage.setItem("token", data.data.token);
                    sessionStorage.setItem("userId", data.data.userId || "");
                    sessionStorage.setItem("username", data.data.username || username);
                    sessionStorage.setItem("onlineTimerStartAt", String(Date.now()));
                    window.location.href = redirectUrl;
                    return;
                }
                showError(registerError, data && data.message ? data.message : "注册失败，请稍后重试");
            } catch (err) {
                showError(registerError, "网络连接后端失败，请稍后再试（服务器可能在冷启动）");
            } finally {
                registerBtn.disabled = false;
                registerBtn.classList.remove("loading");
                registerBtn.textContent = "完成注册";
            }
        });
    </script>
</body>
</html>
