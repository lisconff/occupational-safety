<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 职途安</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #F0F9FF 0%, #E6F7FF 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-box {
            width: 450px;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            padding: 60px 50px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.08);
        }
        .login-title {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: #1D4ED8;
            margin-bottom: 40px;
        }
        .input-group {
            margin-bottom: 25px;
        }
        .input-label {
            display: block;
            font-size: 15px;
            color: #334155;
            margin-bottom: 10px;
            font-weight: 500;
        }
        .login-input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.2);
            font-size: 16px;
            outline: none;
        }
        .login-input:focus {
            border-color: #1D4ED8;
            background: rgba(255, 255, 255, 0.3);
        }
        .login-btn {
            width: 100%;
            padding: 18px;
            background: #1D4ED8;
            color: #fff;
            border: none;
            border-radius: 15px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .login-btn:hover {
            transform: scale(1.03);
            background: #1E40AF;
        }
        .link-tip {
            text-align: center;
            margin-top: 30px;
            font-size: 15px;
            color: #64748B;
        }
        .link-tip a {
            color: #1D4ED8;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 class="login-title">职途安 - 登录</h2>
        <form id="loginForm">
            <div class="input-group">
                <label class="input-label" for="loginUsername">账号</label>
                <input id="loginUsername" type="text" class="login-input" placeholder="请输入手机号/用户名" required>
            </div>
            <div class="input-group">
                <label class="input-label" for="loginPassword">密码</label>
                <input id="loginPassword" type="password" class="login-input" placeholder="请输入密码" required>
            </div>
            <div id="loginError" style="display:none;color:#B91C1C;font-size:14px;margin-top:-8px;margin-bottom:12px;"></div>
            <button class="login-btn" type="submit">登录</button>
        </form>
        <div class="link-tip">没有账号？<a href="register.html">立即注册</a></div>
    </div>

    <script>
        const API_BASE = "http://localhost:8090";
        const loginForm = document.getElementById("loginForm");
        const loginError = document.getElementById("loginError");
        const usernameInput = document.getElementById("loginUsername");
        const passwordInput = document.getElementById("loginPassword");

        function setError(message) {
            loginError.textContent = message;
            loginError.style.display = "block";
        }

        loginForm.addEventListener("submit", async function (event) {
            event.preventDefault();
            loginError.style.display = "none";

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            if (!username || !password) {
                setError("请填写账号和密码");
                return;
            }

            try {
                const response = await fetch(API_BASE + "/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username: username, password: password })
                });

                const data = await response.json();
                if (data && data.code === 200 && data.data && data.data.token) {
                    localStorage.setItem("token", data.data.token);
                    localStorage.setItem("username", data.data.username || username);
                    window.location.href = "home.html";
                    return;
                }

                setError((data && data.message) ? data.message : "用户名或密码错误");
            } catch (error) {
                setError("网络错误，请确认后端服务已启动");
            }
        });
    </script>
</body>
</html>
