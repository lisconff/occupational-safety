<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页 - 大学生就业防坑服务平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            line-height: 1.6;
            color: #1e293b;
            background: linear-gradient(145deg, #eef6ff 0%, #dbeafe 55%, #eff6ff 100%);
        }
        
        /* 顶部导航（与首页统一） */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #dbeafe;
            box-shadow: 0 6px 18px rgba(30,64,175,0.08);
            padding: 14px 0;
        }
        
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: flex-end;
            min-width: 220px;
            flex: 0 0 220px;
        }

        .nav-btn {
            padding: 6px 14px;
            border-radius: 20px;
            background: #eef2ff;
            text-decoration: none;
            color: #1e3a8a;
            font-size: 13px;
            border: 1px solid #c7d2fe;
            cursor: pointer;
        }

        .nav-btn.primary {
            background: #1d4ed8;
            color: #fff;
            border-color: #1d4ed8;
        }

        #guest-nav,
        #user-nav {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #user-nav {
            display: none;
        }

        .avatar-wrapper {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            overflow: hidden;
            background: #1d4ed8;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            cursor: pointer;
        }

        .avatar-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .logo {
            display: flex;
            align-items: center;
            font-weight: bold;
            font-size: 20px;
            color: #111827;
            min-width: 110px;
        }

        .logo h1 {
            font-size: 20px;
            color: #111827;
        }

        .nav-center {
            display: flex;
            flex: 1;
            justify-content: center;
            gap: 30px;
        }

        .nav-center a {
            color: #334155;
            text-decoration: none;
            font-size: 14px;
            position: relative;
        }

        .nav-center a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: #1677ff;
            transition: 0.3s;
        }

        .nav-center a:hover::after {
            width: 100%;
        }

        .nav-center a:hover {
            color: #1d4ed8;
        }
        
        /* 主要内容区 */
        .main-content {
            max-width: 1200px;
            margin: 110px auto 40px;
            padding: 0 20px;
        }
        
        /* 个人信息面板 */
        .profile-header {
            background-color: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 10px 24px rgba(30,64,175,0.08);
            border: 1px solid #dbeafe;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            display: none;
        }

        .profile-avatar-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-right: 30px;
            gap: 10px;
            position: relative;
        }

        .profile-avatar-fallback {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: #fff;
            font-size: 40px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .avatar-upload-btn {
            font-size: 12px;
            color: #1d4ed8;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 999px;
            padding: 5px 12px;
            cursor: pointer;
        }
        
        .profile-info {
            flex: 1;
            min-width: 250px;
        }
        
        .profile-info h2 {
            font-size: 24px;
            color: #1e3a8a;
            margin-bottom: 10px;
        }
        
        .profile-info p {
            font-size: 16px;
            color: #666;
            margin-bottom: 15px;
        }
        
        .skill-bar {
            width: 100%;
            height: 20px;
            background-color: #F0F0F0;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .skill-progress {
            height: 100%;
            background: linear-gradient(90deg, #1e3a8a, #2563eb);
            border-radius: 10px;
            transition: width 1s ease;
        }
        
        .skill-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        
        /* 内容布局 */
        .content-layout {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        
        /* 左侧功能菜单 */
        .sidebar {
            flex: 0 0 250px;
            min-width: 200px;
        }
        
        .menu-card {
            background-color: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(30,64,175,0.08);
            border: 1px solid #dbeafe;
            margin-bottom: 20px;
        }
        
        .menu-card h3 {
            font-size: 18px;
            color: #1e3a8a;
            margin-bottom: 15px;
            border-bottom: 2px solid #93c5fd;
            padding-bottom: 10px;
        }
        
        .menu-item {
            display: block;
            padding: 10px 15px;
            color: #333;
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.3s ease;
            margin-bottom: 5px;
            border-left: 3px solid transparent;
        }
        
        .menu-item:hover {
            background-color: #eff6ff;
            color: #1d4ed8;
            border-left-color: #1d4ed8;
        }
        
        .menu-item.active {
            background-color: #eff6ff;
            font-weight: bold;
            color: #1d4ed8;
            border-left-color: #1d4ed8;
        }
        
        /* 右侧内容展示区 */
        .content-area {
            flex: 1;
            min-width: 300px;
        }
        
        .content-card {
            background-color: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(30,64,175,0.08);
            border: 1px solid #dbeafe;
            margin-bottom: 20px;
            border-left: 4px solid #93c5fd;
        }
        
        .content-card h3 {
            font-size: 18px;
            color: #1e3a8a;
            margin-bottom: 15px;
            border-bottom: 2px solid #93c5fd;
            padding-bottom: 10px;
        }
        
        /* 收藏和浏览记录 */
        .record-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #F0F0F0;
            transition: all 0.3s ease;
        }
        
        .record-item:hover {
            background-color: #eff6ff;
            transform: translateX(5px);
        }
        
        .record-item:last-child {
            border-bottom: none;
        }
        
        .record-icon {
            width: 50px;
            height: 50px;
            background-color: #dbeafe;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 24px;
            color: #1e3a8a;
            transition: all 0.3s ease;
        }
        
        .record-item:hover .record-icon {
            background-color: #1d4ed8;
            color: white;
        }
        
        .record-info {
            flex: 1;
        }
        
        .record-info h4 {
            font-size: 16px;
            color: #1e3a8a;
            margin-bottom: 5px;
        }
        
        .record-info p {
            font-size: 14px;
            color: #666;
        }
        
        .record-time {
            font-size: 12px;
            color: #999;
        }
        
        /* 底部页脚 */
        .footer {
            background-color: #333;
            color: white;
            padding: 30px 0;
            text-align: center;
            margin-top: 60px;
        }
        
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .footer p {
            margin-bottom: 10px;
        }
        
        .footer-links {
            margin-top: 15px;
        }
        
        .footer-links a {
            color: #93c5fd;
            text-decoration: none;
            margin: 0 10px;
        }
        
        .footer-links a:hover {
            text-decoration: underline;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .nav-container {
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
            }

            .nav-links {
                justify-content: center;
            }
            
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
            
            .profile-avatar {
                margin-right: 0;
                margin-bottom: 20px;
            }
            
            .content-layout {
                flex-direction: column;
            }
            
            .sidebar {
                flex: 1;
            }
        }
    </style>
</head>

    <script>
        const API_BASE = 'http://localhost:8090';

        function isLoggedIn() {
            return Boolean(getToken());
        }

        function requireLogin(actionName) {
            if (isLoggedIn()) {
                return true;
            }
            const goLogin = window.confirm(actionName + '需要登录后使用，是否前往登录页？');
            if (goLogin) {
                const redirect = encodeURIComponent('profile.html');
                const action = encodeURIComponent(actionName);
                window.location.href = 'login.html?redirect=' + redirect + '&action=' + action;
            }
            return false;
        }

        function getToken() {
            return localStorage.getItem('token') || sessionStorage.getItem('token') || '';
        }

        function getUsername() {
            return localStorage.getItem('username') || sessionStorage.getItem('username') || '游客';
        }

        function getCurrentUserId() {
            return localStorage.getItem('userId') || sessionStorage.getItem('userId') || '';
        }

        const USER_AVATAR_MAP_KEY = 'userAvatarMap';
        const USER_AVATAR_OWNER_KEY = 'userAvatarOwner';

        function getAvatarMap() {
            try {
                const raw = localStorage.getItem(USER_AVATAR_MAP_KEY);
                if (!raw) return {};
                const parsed = JSON.parse(raw);
                return parsed && typeof parsed === 'object' ? parsed : {};
            } catch (e) {
                return {};
            }
        }

        function setAvatarMap(map) {
            localStorage.setItem(USER_AVATAR_MAP_KEY, JSON.stringify(map || {}));
        }

        function getAvatarDataUrl(userId) {
            const key = userId || getUsername();
            const map = getAvatarMap();
            if (key && map[key]) {
                return map[key];
            }
            return '';
        }

        function setAvatarDataUrl(url) {
            const username = getUsername();
            const userId = getCurrentUserId();
            const map = getAvatarMap();
            if (username) {
                map[username] = url;
                if (userId) {
                    map[userId] = url;
                }
                setAvatarMap(map);
                localStorage.setItem(USER_AVATAR_OWNER_KEY, userId || username);
            }
            localStorage.setItem('userAvatar', url);
        }

        function upsertAuthMirror() {
            const token = getToken();
            const userId = getCurrentUserId();
            const username = getUsername();
            if (!token) return;
            [localStorage, sessionStorage].forEach((store) => {
                if (!store.getItem('token')) store.setItem('token', token);
                if (userId && !store.getItem('userId')) store.setItem('userId', userId);
                if (username && username !== '游客' && !store.getItem('username')) store.setItem('username', username);
            });
        }

        async function fetchCurrentProfile() {
            const userId = getCurrentUserId();
            const token = getToken();
            if (!userId || !token) return null;
            try {
                const response = await fetch(API_BASE + '/api/users/' + encodeURIComponent(userId) + '/profile', {
                    headers: { Authorization: 'Bearer ' + token }
                });
                const data = await response.json();
                if (data && data.code === 200 && data.data) {
                    return data.data;
                }
            } catch (e) {
            }
            return null;
        }

        function fillProfileForm(profile) {
            document.getElementById('school').value = profile && profile.school ? profile.school : '';
            document.getElementById('major').value = profile && profile.major ? profile.major : '';
            document.getElementById('graduationYear').value = profile && profile.graduationYear ? profile.graduationYear : '';
            document.getElementById('expectedCity').value = profile && profile.expectedCity ? profile.expectedCity : '';
            document.getElementById('expectedSalary').value = profile && profile.expectedSalary ? profile.expectedSalary : '';
            document.getElementById('bio').value = profile && profile.bio ? profile.bio : '';
        }

        function updateProfileHeader(profile) {
            const username = getUsername();
            document.getElementById('profileDisplayName').textContent = username;
            const school = profile && profile.school ? profile.school : '';
            const major = profile && profile.major ? profile.major : '';
            const summary = [school, major].filter(Boolean).join(' · ');
            document.getElementById('profileSummary').textContent = summary || '资料待完善';
            document.getElementById('antiFraudValue').textContent = '未知';
            document.getElementById('antiFraudProgress').style.width = '0%';
        }

        async function saveProfile() {
            const userId = getCurrentUserId();
            const token = getToken();
            if (!userId || !token) {
                throw new Error('未登录');
            }

            const payload = {
                school: (document.getElementById('school').value || '').trim(),
                major: (document.getElementById('major').value || '').trim(),
                graduationYear: (() => {
                    const value = (document.getElementById('graduationYear').value || '').trim();
                    return value ? Number(value) : null;
                })(),
                expectedCity: (document.getElementById('expectedCity').value || '').trim() || null,
                expectedSalary: (document.getElementById('expectedSalary').value || '').trim() || null,
                bio: (document.getElementById('bio').value || '').trim() || null
            };

            if (!payload.school || !payload.major) {
                throw new Error('学校和专业为必填项');
            }

            const response = await fetch(API_BASE + '/api/users/' + encodeURIComponent(userId) + '/profile', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            if (!(data && data.code === 200 && data.data)) {
                throw new Error((data && data.message) || '保存失败');
            }
            return data.data;
        }

        async function syncCurrentUserAvatarFromBackend() {
            const userId = getCurrentUserId();
            const token = getToken();
            const username = getUsername();
            if (!userId || !token) return;
            try {
                const response = await fetch(API_BASE + '/api/users/' + encodeURIComponent(userId) + '/profile', {
                    headers: { Authorization: 'Bearer ' + token }
                });
                const data = await response.json();
                if (!(data && data.code === 200 && data.data)) return;
                const avatarDataUrl = data.data.avatarDataUrl || '';
                if (avatarDataUrl) {
                    setAvatarDataUrl(avatarDataUrl);
                } else {
                    const map = getAvatarMap();
                    delete map[userId];
                    if (username) delete map[username];
                    setAvatarMap(map);
                    localStorage.removeItem('userAvatar');
                    localStorage.removeItem(USER_AVATAR_OWNER_KEY);
                }
            } catch (e) {
            }
        }

        async function uploadAvatarToBackend(avatarDataUrl) {
            const userId = getCurrentUserId();
            const token = getToken();
            if (!userId || !token) {
                throw new Error('未登录');
            }
            const response = await fetch(API_BASE + '/api/users/' + encodeURIComponent(userId) + '/avatar', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({ avatarDataUrl: avatarDataUrl || null })
            });
            const data = await response.json();
            if (!(data && data.code === 200)) {
                throw new Error((data && data.message) || '头像上传失败');
            }
        }

        function renderTopRightUser() {
            const guestNav = document.getElementById('guest-nav');
            const userNav = document.getElementById('user-nav');
            const nameEl = document.getElementById('topUserName');
            const avatarImg = document.getElementById('topAvatarImage');
            const avatarLetter = document.getElementById('topAvatarLetter');

            const username = getUsername();
            const token = getToken();
            const avatarUrl = getAvatarDataUrl(localStorage.getItem('userId') || sessionStorage.getItem('userId') || username);

            if (token) {
                guestNav.style.display = 'none';
                userNav.style.display = 'flex';
                nameEl.textContent = username;
                if (avatarUrl) {
                    avatarImg.src = avatarUrl;
                    avatarImg.style.display = 'block';
                    avatarLetter.style.display = 'none';
                } else {
                    avatarImg.style.display = 'none';
                    avatarLetter.style.display = 'inline';
                    avatarLetter.textContent = (username || '游').charAt(0).toUpperCase();
                }
            } else {
                guestNav.style.display = 'flex';
                userNav.style.display = 'none';
            }
        }

        function renderProfileAvatar() {
            const avatar = document.getElementById('profileAvatar');
            const avatarLetter = document.getElementById('profileAvatarLetter');
            const username = getUsername();
            const avatarUrl = getAvatarDataUrl(localStorage.getItem('userId') || sessionStorage.getItem('userId') || getUsername());
            if (avatarUrl) {
                avatar.src = avatarUrl;
                avatar.style.display = 'block';
                avatarLetter.style.display = 'none';
            } else {
                avatar.removeAttribute('src');
                avatar.style.display = 'none';
                avatarLetter.style.display = 'inline-flex';
                avatarLetter.textContent = (username || '游').charAt(0).toUpperCase();
            }
        }

        // 页面加载时的动画效果
        window.onload = async function() {
            upsertAuthMirror();
            await syncCurrentUserAvatarFromBackend();
            renderTopRightUser();
            renderProfileAvatar();

            const profile = await fetchCurrentProfile();
            fillProfileForm(profile);
            updateProfileHeader(profile);

            document.querySelectorAll('[data-auth-required="true"]').forEach(function (el) {
                el.addEventListener('click', function (event) {
                    event.preventDefault();
                    const target = el.getAttribute('href') || 'ai-chat-test.html';
                    if (requireLogin(el.textContent.trim() || '该功能')) {
                        window.location.href = target;
                    }
                });
            });

            document.getElementById('topAvatarWrap').addEventListener('click', function () {
                window.location.href = 'profile.html';
            });

            document.getElementById('logoutBtn').addEventListener('click', function () {
                localStorage.removeItem('token');
                localStorage.removeItem('username');
                localStorage.removeItem('userId');
                localStorage.removeItem(USER_AVATAR_OWNER_KEY);
                sessionStorage.removeItem('token');
                sessionStorage.removeItem('username');
                sessionStorage.removeItem('userId');
                sessionStorage.removeItem(USER_AVATAR_OWNER_KEY);
                location.reload();
            });

            document.getElementById('avatarUpload').addEventListener('change', function (event) {
                const file = event.target.files && event.target.files[0];
                if (!file) {
                    return;
                }
                if (!file.type.startsWith('image/')) {
                    alert('请上传图片文件');
                    return;
                }
                if (file.size > 2 * 1024 * 1024) {
                    alert('头像图片建议不超过 2MB');
                    return;
                }

                const reader = new FileReader();
                reader.onload = async function (e) {
                    const dataUrl = e.target.result;
                    try {
                        await uploadAvatarToBackend(dataUrl);
                        setAvatarDataUrl(dataUrl);
                        renderProfileAvatar();
                        renderTopRightUser();
                    } catch (err) {
                        alert(err && err.message ? err.message : '头像上传失败');
                    }
                };
                reader.readAsDataURL(file);
            });
            document.getElementById('profileForm').addEventListener('submit', async function (e) {
                e.preventDefault();
                const messageEl = document.getElementById('profileSaveMessage');
                const btn = document.getElementById('saveProfileBtn');
                messageEl.textContent = '';
                btn.disabled = true;
                btn.textContent = '保存中...';
                try {
                    const saved = await saveProfile();
                    fillProfileForm(saved);
                    updateProfileHeader(saved);
                    messageEl.style.color = '#15803d';
                    messageEl.textContent = '保存成功';
                } catch (err) {
                    messageEl.style.color = '#b91c1c';
                    messageEl.textContent = err && err.message ? err.message : '保存失败';
                } finally {
                    btn.disabled = false;
                    btn.textContent = '保存资料';
                }
            });
        };
    </script>
</body>
</html>
